<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>合伙生意记账</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#F9FAFB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#root{max-width:480px;margin:0 auto;min-height:100vh;background:#fff}
input,select{font-family:inherit;font-size:14px;background:#F3F4F6;color:#111827;border:none;border-radius:12px;padding:10px 14px;width:100%;outline:none;-webkit-appearance:none}
input:focus,select:focus{box-shadow:0 0 0 2px rgba(192,132,252,0.4)}
button{font-family:inherit;cursor:pointer;border:none}
.pill{display:flex;background:#F3F4F6;border-radius:20px;padding:3px;gap:2px}
.pill button{border-radius:16px;padding:5px 12px;font-size:12px;background:transparent;color:#6B7280}
.pill button.on{background:#fff;color:#A855F7;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.chip{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;background:#F3F4F6;color:#6B7280;cursor:pointer;user-select:none}
.chip.on{background:#F3E8FF;color:#9333EA;font-weight:600}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9CA3AF;margin-bottom:10px}
.lbl{font-size:12px;color:#6B7280;margin-bottom:5px;font-weight:500}
.ibtn{background:none;color:#9CA3AF;padding:4px 8px;font-size:15px;border-radius:8px;border:none;cursor:pointer}
.ghost{border:1.5px solid #E9D5FF;border-radius:12px;padding:9px 16px;background:transparent;color:#A855F7;font-size:13px;font-weight:500;cursor:pointer}
</style>
</head>
<body>
<div id="root"><p style="padding:40px;text-align:center;color:#9CA3AF">加载中...</p></div>
<script>
(function() {
  "use strict";

  function init() {
    if (!window.React || !window.ReactDOM) {
      document.getElementById("root").innerHTML = "<p style='padding:40px;color:red'>React加载失败，请刷新</p>";
      return;
    }

    var h = React.createElement;
    var useState = React.useState;
    var useReducer = React.useReducer;
    var useMemo = React.useMemo;
    var useEffect = React.useEffect;
    var RC = window.Recharts || {};
    var hasCharts = !!(RC.ResponsiveContainer && RC.BarChart && RC.PieChart);

    var PAL = ["#C084FC","#F472B6","#FB923C","#34D399","#60A5FA","#FBBF24","#A78BFA","#F87171"];
    var G = "linear-gradient(135deg,#C084FC,#F472B6)";
    var G2 = "linear-gradient(135deg,#818CF8,#C084FC)";
    var SK = "bizbook_v6";

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
    function tod() { return new Date().toISOString().slice(0,10); }
    function tmn() { return new Date().toISOString().slice(0,7); }
    function genM() {
      var r=[], now=new Date();
      for(var i=-6;i<=6;i++){var d=new Date(now.getFullYear(),now.getMonth()+i,1);r.push(d.toISOString().slice(0,7));}
      return r;
    }
    var MONTHS = genM();
    function fn(n,d){d=d||2;return isNaN(+n)?"0.00":(+n).toFixed(d);}
    function fc(n,c){return c==="AUD"?"A$"+fn(n):"¥"+fn(n);}
    function tb(a,c,bc,r){
      var v=+a||0;
      if(c===bc)return v;
      if(bc==="CNY"&&c==="AUD")return v*(+r||1);
      if(bc==="AUD"&&c==="CNY")return v/(+r||1);
      return v;
    }
    function rb(e,r,m,bc){
      if(m==="historical")return e.amountBase||0;
      return tb(e.amount,e.currency,bc,r);
    }

    function lsSave(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(x){}}
    function lsLoad(){try{var s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch(x){return null;}}

    function calcBal(entries,partners,rate,mode,bc) {
      var op=entries.filter(function(x){return x.type!=="capital"&&x.type!=="settlement";});
      var inc=0,exp=0;
      op.forEach(function(x){if(x.type==="income")inc+=rb(x,rate,mode,bc);else exp+=rb(x,rate,mode,bc);});
      var profit=inc-exp;
      var held={};
      partners.forEach(function(p){held[p.id]=0;});
      op.forEach(function(x){
        if(!x.paidBy||held[x.paidBy]===undefined)return;
        var b=rb(x,rate,mode,bc);
        if(x.type==="income")held[x.paidBy]+=b;
        else held[x.paidBy]-=b;
      });
      entries.filter(function(x){return x.type==="capital"&&(x.capitalFlow||"pool")==="pool";}).forEach(function(x){
        if(held[x.paidBy]!==undefined)held[x.paidBy]-=rb(x,rate,mode,bc);
      });
      entries.filter(function(x){return x.type==="settlement";}).forEach(function(x){
        if(!x.fromId||!x.toId)return;
        var b=rb(x,rate,mode,bc);
        if(held[x.fromId]!==undefined)held[x.fromId]+=b;
        if(held[x.toId]!==undefined)held[x.toId]-=b;
      });
      var bal={};
      partners.forEach(function(p){bal[p.id]=(profit*(p.ratio/100))-held[p.id];});
      return bal;
    }

    function getLoans(entries,partners,rate,mode,bc) {
      var loans={};
      entries.filter(function(x){return x.type==="capital"&&x.capitalFlow==="partner"&&x.paidBy&&x.capitalTo&&x.capitalTo!==x.paidBy;}).forEach(function(x){
        var k=x.capitalTo+"_"+x.paidBy;
        loans[k]=(loans[k]||0)+rb(x,rate,mode,bc);
      });
      var res=[];
      Object.keys(loans).forEach(function(k){
        var amt=loans[k];
        if(amt<=0.005)return;
        var p=k.split("_"), bid=p[0], lid=p[1];
        var bn=partners.find(function(x){return x.id===bid;});
        var ln=partners.find(function(x){return x.id===lid;});
        res.push({from:bid,fromName:bn?bn.name:"?",to:lid,toName:ln?ln.name:"?",amount:amt,isLoan:true});
      });
      return res;
    }

    function minTr(bal,partners) {
      var arr=partners.map(function(p){return{id:p.id,name:p.name,b:bal[p.id]||0};}).sort(function(a,b){return a.b-b.b;});
      var tr=[],lo=0,hi=arr.length-1;
      while(lo<hi){
        if(Math.abs(arr[lo].b)<0.005){lo++;continue;}
        if(Math.abs(arr[hi].b)<0.005){hi--;continue;}
        var a=Math.min(-arr[lo].b,arr[hi].b);
        if(a>0.005)tr.push({from:arr[lo].id,fromName:arr[lo].name,to:arr[hi].id,toName:arr[hi].name,amount:a});
        arr[lo].b+=a;arr[hi].b-=a;
        if(Math.abs(arr[lo].b)<0.005)lo++;
        if(Math.abs(arr[hi].b)<0.005)hi--;
      }
      return tr;
    }

    function mergeTr(ptrs,ltrs,partners) {
      var net={};
      partners.forEach(function(p){net[p.id]=0;});
      ptrs.concat(ltrs).forEach(function(t){net[t.from]-=t.amount;net[t.to]+=t.amount;});
      return minTr(net,partners);
    }

    function initSt(saved) {
      var def={setup:null,month:tmn(),tab:"dash",rateMode:"historical",entries:[],settlements:[],cd:null,sf:null,ee:null,ss:false,sm:false};
      if(!saved)return def;
      return Object.assign({},def,saved,{cd:null,sf:null,ee:null,ss:false,sm:false});
    }

    function red(s,a) {
      var n;
      switch(a.t){
        case"DONE": n=Object.assign({},s,{setup:a.v,tab:"dash",sf:null,ee:null});break;
        case"TAB":  n=Object.assign({},s,{tab:a.v,sf:null,ee:null,ss:false,sm:false});break;
        case"MON":  n=Object.assign({},s,{month:a.v});break;
        case"RM":   n=Object.assign({},s,{rateMode:a.v});break;
        case"UPS":  n=Object.assign({},s,{setup:a.v});break;
        case"SF":   n=Object.assign({},s,{sf:a.v,ee:null,ss:false,sm:false});break;
        case"EE":   n=Object.assign({},s,{ee:a.v,sf:a.v.type,ss:false,sm:false});break;
        case"AI":   n=Object.assign({},s,{entries:s.entries.concat([Object.assign({},a.v,{id:uid()})]),sf:null,ee:null});break;
        case"UI":   n=Object.assign({},s,{entries:s.entries.map(function(x){return x.id===a.v.id?a.v:x;}),sf:null,ee:null});break;
        case"DI":   n=Object.assign({},s,{entries:s.entries.filter(function(x){return x.id!==a.v;}),cd:null});break;
        case"AS":   n=Object.assign({},s,{settlements:s.settlements.concat([Object.assign({},a.v,{id:uid()})]),entries:s.entries.concat(a.se),ss:false,sm:false});break;
        case"DS":{var lk=(s.settlements.find(function(x){return x.id===a.v;})||{}).linkedEntryIds||[];n=Object.assign({},s,{settlements:s.settlements.filter(function(x){return x.id!==a.v;}),entries:s.entries.filter(function(x){return lk.indexOf(x.id)===-1;}),cd:null});break;}
        case"CD":   n=Object.assign({},s,{cd:a.v});break;
        case"CC":   n=Object.assign({},s,{cd:null});break;
        case"RESET":localStorage.removeItem(SK);return initSt(null);
        case"SS":   n=Object.assign({},s,{ss:a.v,sf:null,ee:null,sm:false});break;
        case"SM":   n=Object.assign({},s,{sm:a.v,sf:null,ee:null,ss:false});break;
        default:return s;
      }
      lsSave(n);return n;
    }

    // ── tiny helpers ──────────────────────────────────────────────────────────
    function dv(style){
      var c=[];
      for(var i=1;i<arguments.length;i++){if(arguments[i]!==null&&arguments[i]!==undefined&&arguments[i]!==false)c.push(arguments[i]);}
      return h("div",{style:style},c);
    }
    function Lbl(p){return h("p",{className:"lbl"},p.t);}
    function Inp(p){return h("input",{type:p.type||"text",value:p.val,placeholder:p.ph||"",onChange:function(e){p.set(e.target.value);},style:p.sx||{}});}
    function Sel(p){return h("select",{value:p.val,onChange:function(e){p.set(e.target.value);}},p.opts.map(function(o){return h("option",{key:o[0],value:o[0]},o[1]);}));}
    function Rt(p){return dv({display:"flex",background:"#F3F4F6",borderRadius:20,padding:3,gap:2},h("button",{className:p.val==="historical"?"pill on":"pill",style:{borderRadius:16,padding:"5px 12px",fontSize:12,background:p.val==="historical"?"#fff":"transparent",color:p.val==="historical"?"#A855F7":"#6B7280",fontWeight:p.val==="historical"?600:400,border:"none",cursor:"pointer"},onClick:function(){p.set("historical");}},"历史汇率"),h("button",{className:p.val==="current"?"pill on":"pill",style:{borderRadius:16,padding:"5px 12px",fontSize:12,background:p.val==="current"?"#fff":"transparent",color:p.val==="current"?"#A855F7":"#6B7280",fontWeight:p.val==="current"?600:400,border:"none",cursor:"pointer"},onClick:function(){p.set("current");}},"当前汇率"));}
    function Ct(p){return dv({display:"flex",background:"#F3F4F6",borderRadius:20,padding:3,gap:2},h("button",{style:{borderRadius:16,padding:"5px 12px",fontSize:12,background:p.val==="CNY"?"#fff":"transparent",color:p.val==="CNY"?"#A855F7":"#6B7280",fontWeight:p.val==="CNY"?600:400,border:"none",cursor:"pointer"},onClick:function(){p.set("CNY");}},"¥ CNY"),h("button",{style:{borderRadius:16,padding:"5px 12px",fontSize:12,background:p.val==="AUD"?"#fff":"transparent",color:p.val==="AUD"?"#A855F7":"#6B7280",fontWeight:p.val==="AUD"?600:400,border:"none",cursor:"pointer"},onClick:function(){p.set("AUD");}},"A$ AUD"));}
    function Av(p){var sz=p.sz||36,c=PAL[(p.i||0)%PAL.length];return dv({width:sz,height:sz,borderRadius:"50%",background:c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.38,fontWeight:700,color:"#fff",flexShrink:0,boxShadow:"0 2px 8px "+c+"55"},(p.n||"?").slice(0,1).toUpperCase());}
    function GB(p){return h("button",{onClick:p.onClick,style:Object.assign({background:p.g||G,color:"#fff",borderRadius:14,padding:"11px 20px",fontWeight:600,fontSize:14,boxShadow:"0 4px 14px rgba(192,132,252,0.3)"},p.sx||{})},p.children);}

    function CDlg(p){
      return dv({position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:999,padding:"0 16px 32px"},
        dv({background:"#fff",borderRadius:24,padding:24,width:"100%",maxWidth:420},
          h("p",{style:{fontSize:15,marginBottom:20,textAlign:"center"}},p.msg),
          dv({display:"flex",gap:10},
            h("button",{className:"ghost",style:{flex:1},onClick:p.onCancel},"取消"),
            h("button",{onClick:p.onOk,style:{flex:1,background:"linear-gradient(135deg,#F87171,#FB923C)",color:"#fff",borderRadius:12,padding:"10px",fontWeight:600,fontSize:14}},"确认"))));
    }

    // ── Setup ─────────────────────────────────────────────────────────────────
    function Setup(p) {
      var s0=useState(0),step=s0[0],setStep=s0[1];
      var ip=p.ex&&p.ex.partners?p.ex.partners:[{id:uid(),name:"",ratio:50},{id:uid(),name:"",ratio:50}];
      var s1=useState(ip),parts=s1[0],setParts=s1[1];
      var s2=useState(p.ex?p.ex.baseCurrency||"CNY":"CNY"),bc=s2[0],setBc=s2[1];
      var s3=useState(String(p.ex?p.ex.rate||4.7:4.7)),rt=s3[0],setRt=s3[1];
      var s4=useState(null),live=s4[0],setLive=s4[1];
      useEffect(function(){
        fetch("https://api.frankfurter.app/latest?from=AUD&to=CNY")
          .then(function(r){return r.json();})
          .then(function(d){if(d&&d.rates&&d.rates.CNY)setLive((+d.rates.CNY).toFixed(4));})
          .catch(function(){});
      },[]);
      var tot=parts.reduce(function(s,x){return s+(+x.ratio||0);},0);
      function up(id,f,v){setParts(function(ps){return ps.map(function(x){return x.id===id?Object.assign({},x,(f==="name"?{name:v}:{ratio:v})):x;});});}
      function rsz(n){
        var cnt=Math.min(8,Math.max(2,n));
        var b=Math.floor(100/cnt),rem=100-b*(cnt-1);
        setParts(Array.from({length:cnt},function(_,i){return{id:(parts[i]&&parts[i].id)||uid(),name:(parts[i]&&parts[i].name)||"",ratio:i===cnt-1?rem:b};}));
      }
      var ok=parts.every(function(x){return x.name.trim();})&&tot===100;
      function done(){p.onDone({partners:parts,baseCurrency:bc,rate:+rt||4.7});}
      var ns=p.ex?1:2;

      if(!p.ex&&step===0){
        return dv({minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",background:"#fff"},
          dv({width:72,height:72,borderRadius:22,background:G,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,margin:"0 auto 20px",boxShadow:"0 8px 24px rgba(192,132,252,0.4)"},"🤝"),
          h("p",{style:{fontSize:26,fontWeight:700,marginBottom:8}},"合伙生意记账"),
          h("p",{style:{fontSize:14,color:"#6B7280",marginBottom:32,lineHeight:1.6,textAlign:"center"}},"澳洲华人合伙小生意",h("br"),"多人分账 · 双币种 · 灵活结算"),
          h(GB,{sx:{width:"100%",padding:14,fontSize:15,borderRadius:16},onClick:function(){setStep(1);}},"开始设置"));
      }
      if(step===(p.ex?0:1)){
        return dv({width:"100%",maxWidth:380,margin:"0 auto",padding:"20px 0"},
          h("p",{style:{fontSize:20,fontWeight:700,marginBottom:4}},"合伙人"),
          h("p",{style:{fontSize:13,color:"#6B7280",marginBottom:18}},"姓名和持股比例，合计需为100%"),
          dv({display:"flex",alignItems:"center",gap:12,marginBottom:16},
            h("p",{style:{fontSize:13,color:"#6B7280"}},"人数"),
            h("button",{className:"ghost",style:{padding:"4px 12px"},onClick:function(){rsz(parts.length-1);}},"−"),
            h("span",{style:{fontWeight:700,minWidth:20,textAlign:"center"}},parts.length),
            h("button",{className:"ghost",style:{padding:"4px 12px"},onClick:function(){rsz(parts.length+1);}},"+")
          ),
          parts.map(function(x,i){
            return dv({key:x.id,display:"flex",gap:10,marginBottom:10,alignItems:"center"},
              h(Av,{n:x.name||String(i+1),i:i,sz:36}),
              h("input",{value:x.name,placeholder:"合伙人"+(i+1),onChange:function(ev){up(x.id,"name",ev.target.value);},style:{flex:2,padding:"10px 14px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14}}),
              h("input",{type:"number",value:x.ratio,onChange:function(ev){up(x.id,"ratio",ev.target.value);},style:{width:60,padding:"10px 8px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14,textAlign:"center"}}),
              h("span",{style:{fontSize:13,color:"#6B7280"}},"%"));
          }),
          h("p",{style:{fontSize:12,color:tot===100?"#10B981":"#F87171",marginTop:6,marginBottom:20,fontWeight:600}},"合计 "+tot+"% "+(tot===100?"✓":"（需等于100%）")),
          dv({display:"flex",gap:10},
            !p.ex&&h("button",{className:"ghost",style:{flex:1},onClick:function(){setStep(0);}},"上一步"),
            h(GB,{sx:{flex:2,padding:12},onClick:function(){if(ok)setStep(ns);},g:ok?G:"linear-gradient(135deg,#D1D5DB,#9CA3AF)"},"下一步")));
      }
      return dv({width:"100%",maxWidth:380,margin:"0 auto",padding:"20px 0"},
        h("p",{style:{fontSize:20,fontWeight:700,marginBottom:4}},"货币 & 汇率"),
        dv({marginBottom:16},
          h(Lbl,{t:"主要结算货币"}),
          dv({display:"flex",gap:10},
            h("button",{onClick:function(){setBc("CNY");},style:{flex:1,padding:"12px",borderRadius:14,background:bc==="CNY"?G:"#F3F4F6",color:bc==="CNY"?"#fff":"#6B7280",fontWeight:bc==="CNY"?700:400,fontSize:14,boxShadow:bc==="CNY"?"0 4px 12px rgba(192,132,252,0.3)":"none"}},"人民币 ¥"),
            h("button",{onClick:function(){setBc("AUD");},style:{flex:1,padding:"12px",borderRadius:14,background:bc==="AUD"?G:"#F3F4F6",color:bc==="AUD"?"#fff":"#6B7280",fontWeight:bc==="AUD"?700:400,fontSize:14,boxShadow:bc==="AUD"?"0 4px 12px rgba(192,132,252,0.3)":"none"}},"澳币 A$"))),
        dv({marginBottom:20},
          h(Lbl,{t:"默认汇率（1 AUD = ? CNY）"}),
          live&&dv({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F3E8FF",borderRadius:12,marginBottom:8},
            h("span",{style:{fontSize:13,color:"#7C3AED",fontWeight:500}},"实时 1 AUD = "+live+" CNY"),
            h("button",{className:"ghost",style:{padding:"4px 10px",fontSize:12},onClick:function(){setRt(live);}},"使用")),
          h("input",{type:"number",value:rt,placeholder:"4.70",onChange:function(e){setRt(e.target.value);},style:{background:"#F3F4F6",border:"none",borderRadius:12,padding:"10px 14px",fontSize:14,width:"100%"}})),
        dv({display:"flex",gap:10},
          h("button",{className:"ghost",style:{flex:1},onClick:function(){setStep(p.ex?0:1);}},"上一步"),
          h(GB,{sx:{flex:2,padding:12},onClick:done},p.ex?"保存":"开始使用")));
    }

    // ── EntryForm ──────────────────────────────────────────────────────────────
    function EF(p) {
      var isI=p.type==="income",isC=p.type==="capital",ed=p.editing;
      var initPB=ed?ed.paidBy:(p.setup.partners[0]?p.setup.partners[0].id:"");
      var initCT=ed?ed.capitalTo||"":"";
      if(!initCT){var oth=p.setup.partners.filter(function(x){return x.id!==initPB;});initCT=oth.length?oth[0].id:"";}
      var a=useState(ed?ed.date:p.month+"-01"),date=a[0],setDate=a[1];
      var b=useState(ed?String(ed.amount):""),amt=b[0],setAmt=b[1];
      var c=useState(ed?ed.currency:p.setup.baseCurrency),cur=c[0],setCur=c[1];
      var d=useState(String(ed?ed.rateAtEntry:p.setup.rate)),er=d[0],setEr=d[1];
      var e2=useState(ed?ed.category||"":""),cat=e2[0],setCat=e2[1];
      var f=useState(initPB),pb=f[0],setPb=f[1];
      var g=useState(ed?ed.note||"":""),note=g[0],setNote=g[1];
      var i=useState(ed?ed.capitalFlow||"partner":"partner"),flow=i[0],setFlow=i[1];
      var j=useState(initCT),ct=j[0],setCt=j[1];

      var iC=["销售收入","线上销售","退款回收","其他收入"];
      var eC=["进货","房租","人工","运费","水电","包装","营销","杂费"];
      var rn=+er||p.setup.rate;
      var prev=amt&&cur!==p.setup.baseCurrency?tb(amt,cur,p.setup.baseCurrency,rn):null;
      var oth2=p.setup.partners.filter(function(x){return x.id!==pb;});
      var safeCt=(ct&&ct!==pb)?ct:(oth2.length?oth2[0].id:"");

      function setPbSafe(v){
        setPb(v);
        if(ct===v){var o=p.setup.partners.filter(function(x){return x.id!==v;});if(o.length)setCt(o[0].id);}
      }
