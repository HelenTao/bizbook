<script>
// 等页面完全加载再执行
window.addEventListener('load', function() {

// 检查依赖是否加载成功
if (!window.React || !window.ReactDOM) {
  document.getElementById('root').innerHTML = '<p style="padding:40px;color:red">加载失败，请检查网络连接后刷新页面</p>';
  return;
}

const {createElement:e,useState,useReducer,useMemo,useEffect,Fragment}=React;
// Recharts 可能在不同版本有不同的导出方式
const RC=window.Recharts||{};
const {PieChart,Pie,Cell,BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer}=RC;
const hasCharts=!!(PieChart&&BarChart&&ResponsiveContainer);

// ─── 常量 ────────────────────────────────────────────────────────────────
const PALETTE=["#C084FC","#F472B6","#FB923C","#34D399","#60A5FA","#FBBF24","#A78BFA","#F87171"];
const G="linear-gradient(135deg,#C084FC,#F472B6)";
const G2="linear-gradient(135deg,#818CF8,#C084FC)";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const thisMonth=()=>new Date().toISOString().slice(0,7);
function genMonths(){
  const l=[],now=new Date();
  for(let i=-6;i<=6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    l.push(d.toISOString().slice(0,7));
  }
  return l;
}
const ALL_MONTHS=genMonths();
const fmtN=(n,d=2)=>isNaN(Number(n))?"0.00":Number(n).toFixed(d);
const fmtC=(n,cur)=>cur==="AUD"?`A$${fmtN(n)}`:`¥${fmtN(n)}`;
function toBase(amt,cur,base,rate){
  const a=Number(amt)||0;
  if(cur===base)return a;
  if(base==="CNY"&&cur==="AUD")return a*(Number(rate)||1);
  if(base==="AUD"&&cur==="CNY")return a/(Number(rate)||1);
  return a;
}
function resBase(entry,rate,mode,base){
  if(mode==="historical")return entry.amountBase||0;
  return toBase(entry.amount,entry.currency,base,rate);
}

// ─── Storage ──────────────────────────────────────────────────────────────
const SK="bizbook_v5";
function loadSt(){try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch(err){return null;}}
function saveSt(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(err){}}

// ─── Balance ──────────────────────────────────────────────────────────────
function calcBal(entries,partners,rate,mode,base){
  const op=entries.filter(x=>x.type!=="capital"&&x.type!=="settlement");
  const inc=op.filter(x=>x.type==="income").reduce((s,x)=>s+resBase(x,rate,mode,base),0);
  const exp=op.filter(x=>x.type==="expense").reduce((s,x)=>s+resBase(x,rate,mode,base),0);
  const profit=inc-exp;
  const held={};
  partners.forEach(p=>held[p.id]=0);
  // income & expense
  op.forEach(x=>{
    if(!x.paidBy||!held.hasOwnProperty(x.paidBy))return;
    const b=resBase(x,rate,mode,base);
    if(x.type==="income")held[x.paidBy]+=b;
    if(x.type==="expense")held[x.paidBy]-=b;
  });
  // capital flows
  entries.filter(x=>x.type==="capital").forEach(x=>{
    if(!x.paidBy||!held.hasOwnProperty(x.paidBy))return;
    const b=resBase(x,rate,mode,base);
    const f=x.capitalFlow||"pool";
    if(f==="pool"){
      // A paid into shared pool → A is out of pocket, owed back proportionally
      held[x.paidBy]-=b;
    } else if(f==="partner"&&x.capitalTo&&held.hasOwnProperty(x.capitalTo)){
      // A paid B directly → treated like A gave B cash in advance
      // A's held decreases (paid out), B's held increases (received)
      // This means at settlement: A is owed more, B owes more — net effect is A's payment to B is reduced
      held[x.paidBy]-=b;
      held[x.capitalTo]+=b;
    }
    // "self" = no effect until actually spent as an expense
  });
  // past settlement entries offset held
  entries.filter(x=>x.type==="settlement").forEach(x=>{
    if(!x.fromId||!x.toId)return;
    const b=resBase(x,rate,mode,base);
    if(held.hasOwnProperty(x.fromId))held[x.fromId]+=b;
    if(held.hasOwnProperty(x.toId))held[x.toId]-=b;
  });
  const bal={};
  partners.forEach(p=>{bal[p.id]=(profit*(p.ratio/100))-held[p.id];});
  return bal;
}

function minTr(bal,partners){
  const arr=partners.map(p=>({id:p.id,name:p.name,bal:bal[p.id]||0})).sort((a,b)=>a.bal-b.bal);
  const tr=[];let lo=0,hi=arr.length-1;
  const a=arr.map(x=>({...x}));
  while(lo<hi){
    const d=a[lo],c=a[hi];
    if(Math.abs(d.bal)<0.005){lo++;continue;}
    if(Math.abs(c.bal)<0.005){hi--;continue;}
    const amt=Math.min(-d.bal,c.bal);
    if(amt>0.005)tr.push({from:d.id,fromName:d.name,to:c.id,toName:c.name,amount:amt});
    d.bal+=amt;c.bal-=amt;
    if(Math.abs(d.bal)<0.005)lo++;
    if(Math.abs(c.bal)<0.005)hi--;
  }
  return tr;
}

// ─── State ────────────────────────────────────────────────────────────────
function initApp(saved){
  const base={setup:null,month:thisMonth(),tab:"dashboard",rateMode:"historical",entries:[],settlements:[],confirmDel:null,showForm:null,editingEntry:null,showSettle:false,showMerge:false};
  if(!saved)return base;
  return{...base,...saved,confirmDel:null,showForm:null,editingEntry:null,showSettle:false,showMerge:false};
}
function reducer(s,a){
  let n;
  switch(a.type){
    case "SETUP_DONE":n={...s,setup:a.setup,tab:"dashboard",showForm:null,editingEntry:null};break;
    case "SET_TAB":n={...s,tab:a.v,showForm:null,editingEntry:null,showSettle:false,showMerge:false};break;
    case "SET_MONTH":n={...s,month:a.v};break;
    case "SET_RATE_MODE":n={...s,rateMode:a.v};break;
    case "UPDATE_SETUP":n={...s,setup:a.setup};break;
    case "SHOW_FORM":n={...s,showForm:a.v,editingEntry:null,showSettle:false,showMerge:false};break;
    case "EDIT_ENTRY":n={...s,editingEntry:a.entry,showForm:a.entry.type,showSettle:false,showMerge:false};break;
    case "ADD_ENTRY":n={...s,entries:[...s.entries,{...a.entry,id:uid()}],showForm:null,editingEntry:null};break;
    case "UPDATE_ENTRY":n={...s,entries:s.entries.map(x=>x.id===a.entry.id?a.entry:x),showForm:null,editingEntry:null};break;
    case "DEL_ENTRY":n={...s,entries:s.entries.filter(x=>x.id!==a.id),confirmDel:null};break;
    case "ADD_SETTLEMENT":n={...s,settlements:[...s.settlements,{...a.settlement,id:uid()}],entries:[...s.entries,...a.se],showSettle:false,showMerge:false};break;
    case "DEL_SETTLEMENT":{const lk=s.settlements.find(x=>x.id===a.id)?.linkedEntryIds||[];n={...s,settlements:s.settlements.filter(x=>x.id!==a.id),entries:s.entries.filter(x=>!lk.includes(x.id)),confirmDel:null};break;}
    case "CONFIRM_DEL":n={...s,confirmDel:a.payload};break;
    case "CANCEL_DEL":n={...s,confirmDel:null};break;
    case "RESET":localStorage.removeItem(SK);return initApp(null);
    case "SHOW_SETTLE":n={...s,showSettle:a.v,showForm:null,editingEntry:null,showMerge:false};break;
    case "SHOW_MERGE":n={...s,showMerge:a.v,showForm:null,editingEntry:null,showSettle:false};break;
    default:return s;
  }
  saveSt(n);return n;
}

// ─── UI helpers ───────────────────────────────────────────────────────────
function d(style,...children){return e("div",{style},children.filter(Boolean));}
const Lbl=({t})=>e("p",{className:"lbl"},t);
function Inp({val,set,type,ph,style}){return e("input",{type:type||"text",value:val,placeholder:ph||"",onChange:ev=>set(ev.target.value),style:style||{}});}
function Sel({val,set,opts}){return e("select",{value:val,onChange:ev=>set(ev.target.value)},opts.map(([v,l])=>e("option",{key:v,value:v},l)));}
function CurToggle({val,set}){return e("div",{className:"pill"},[["CNY","¥ CNY"],["AUD","A$ AUD"]].map(([v,l])=>e("button",{key:v,className:val===v?"on":"",onClick:()=>set(v)},l)));}
function RateToggle({val,set}){return e("div",{className:"pill"},[["historical","历史汇率"],["current","当前汇率"]].map(([v,l])=>e("button",{key:v,className:val===v?"on":"",onClick:()=>set(v)},l)));}
function Avatar({name,idx,size}){
  const sz=size||36,c=PALETTE[(idx||0)%PALETTE.length];
  return d({width:sz,height:sz,borderRadius:"50%",background:c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.38,fontWeight:700,color:"#fff",flexShrink:0,boxShadow:`0 2px 8px ${c}55`},(name||"?").slice(0,1).toUpperCase());
}
function GBtn({children,onClick,g,style}){
  return e("button",{onClick,style:{background:g||G,color:"#fff",borderRadius:14,padding:"11px 20px",fontWeight:600,fontSize:14,boxShadow:"0 4px 14px rgba(192,132,252,0.3)",...(style||{})}},children);
}
function ConfirmDlg({msg,onOk,onCancel}){
  return d({position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:999,padding:"0 16px 32px"},
    d({background:"#fff",borderRadius:24,padding:24,width:"100%",maxWidth:420},
      e("p",{style:{fontSize:15,marginBottom:20,textAlign:"center"}},msg),
      d({display:"flex",gap:10},
        e("button",{className:"ghost",style:{flex:1},onClick:onCancel},"取消"),
        e("button",{onClick:onOk,style:{flex:1,background:"linear-gradient(135deg,#F87171,#FB923C)",color:"#fff",borderRadius:12,padding:"10px",fontWeight:600,fontSize:14}},"确认")
      )
    )
  );
}

// ─── Setup ────────────────────────────────────────────────────────────────
function Setup({onDone,existing}){
  const [step,setStep]=useState(0);
  const [partners,setPartners]=useState(()=>existing?.partners||[{id:uid(),name:"",ratio:50},{id:uid(),name:"",ratio:50}]);
  const [base,setBase]=useState(existing?.baseCurrency||"CNY");
  const [rate,setRate]=useState(String(existing?.rate||4.70));
  const [live,setLive]=useState(null);
  useEffect(()=>{
    fetch("https://api.frankfurter.app/latest?from=AUD&to=CNY")
      .then(r=>r.json()).then(data=>{if(data?.rates?.CNY)setLive(Number(data.rates.CNY).toFixed(4));}).catch(()=>{});
  },[]);
  const total=partners.reduce((s,p)=>s+Number(p.ratio||0),0);
  const upP=(id,f,v)=>setPartners(ps=>ps.map(p=>p.id===id?{...p,[f]:v}:p));
  const resize=n=>{
    const count=Math.min(8,Math.max(2,n));
    const b=Math.floor(100/count),rem=100-b*(count-1);
    setPartners(Array.from({length:count},(_,i)=>({id:partners[i]?.id||uid(),name:partners[i]?.name||"",ratio:i===count-1?rem:b})));
  };
  const ok=partners.every(p=>p.name.trim())&&total===100;
  const done=()=>onDone({partners,baseCurrency:base,rate:Number(rate)||4.7});

  // Welcome screen (only for first setup)
  if(!existing&&step===0){
    return d({minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",background:"#fff"},
      d({width:72,height:72,borderRadius:22,background:G,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,margin:"0 auto 20px",boxShadow:"0 8px 24px rgba(192,132,252,0.4)"},"🤝"),
      e("p",{style:{fontSize:26,fontWeight:700,marginBottom:8}},"合伙生意记账"),
      e("p",{style:{fontSize:14,color:"#6B7280",marginBottom:32,lineHeight:1.6,textAlign:"center"}},"澳洲华人合伙小生意",e("br"),"多人分账 · 双币种 · 灵活结算"),
      e(GBtn,{style:{width:"100%",padding:14,fontSize:15,borderRadius:16},onClick:()=>setStep(1)},"开始设置")
    );
  }

  // Partners step
  if(step===(existing?0:1)){
    return d({width:"100%",maxWidth:380,margin:"0 auto",padding:"20px 0"},
      e("p",{style:{fontSize:20,fontWeight:700,marginBottom:4}},"合伙人"),
      e("p",{style:{fontSize:13,color:"#6B7280",marginBottom:18}},"姓名和持股比例，合计需为100%"),
      d({display:"flex",alignItems:"center",gap:12,marginBottom:16},
        e("p",{style:{fontSize:13,color:"#6B7280"}},"人数"),
        e("button",{className:"ghost",style:{padding:"4px 12px"},onClick:()=>resize(partners.length-1)},"−"),
        e("span",{style:{fontWeight:700,minWidth:20,textAlign:"center"}},partners.length),
        e("button",{className:"ghost",style:{padding:"4px 12px"},onClick:()=>resize(partners.length+1)},"+")
      ),
      ...partners.map((p,i)=>d({key:p.id,display:"flex",gap:10,marginBottom:10,alignItems:"center"},
        e(Avatar,{name:p.name||String(i+1),idx:i,size:36}),
        e("input",{value:p.name,placeholder:`合伙人 ${i+1}`,onChange:ev=>upP(p.id,"name",ev.target.value),style:{flex:2,padding:"10px 14px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14}}),
        e("input",{type:"number",value:p.ratio,onChange:ev=>upP(p.id,"ratio",ev.target.value),style:{width:60,padding:"10px 8px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14,textAlign:"center"}}),
        e("span",{style:{fontSize:13,color:"#6B7280"}},"%")
      )),
      e("p",{style:{fontSize:12,color:total===100?"#10B981":"#F87171",marginTop:6,marginBottom:20,fontWeight:600}},`合计 ${total}% ${total===100?"✓":"（需等于100%）"}`),
      d({display:"flex",gap:10},
        !existing&&e("button",{className:"ghost",style:{flex:1},onClick:()=>setStep(0)},"上一步"),
        e(GBtn,{style:{flex:2,padding:12},onClick:()=>ok&&setStep(existing?1:2),g:ok?G:"linear-gradient(135deg,#D1D5DB,#9CA3AF)"},"下一步")
      )
    );
  }

  // Currency step
  return d({width:"100%",maxWidth:380,margin:"0 auto",padding:"20px 0"},
    e("p",{style:{fontSize:20,fontWeight:700,marginBottom:4}},"货币 & 汇率"),
    e("p",{style:{fontSize:13,color:"#6B7280",marginBottom:18}},"主要结算货币和默认汇率"),
    d({marginBottom:16},
      e(Lbl,{t:"主要结算货币"}),
      d({display:"flex",gap:10},
        [["CNY","人民币 ¥"],["AUD","澳币 A$"]].map(([v,l])=>e("button",{key:v,onClick:()=>setBase(v),style:{flex:1,padding:"12px",borderRadius:14,background:base===v?G:"#F3F4F6",color:base===v?"#fff":"#6B7280",fontWeight:base===v?700:400,fontSize:14,boxShadow:base===v?"0 4px 12px rgba(192,132,252,0.3)":"none"}},l))
      )
    ),
    d({marginBottom:20},
      e(Lbl,{t:"默认汇率（1 AUD = ? CNY）"}),
      live&&d({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F3E8FF",borderRadius:12,marginBottom:8},
        e("span",{style:{fontSize:13,color:"#7C3AED",fontWeight:500}},`实时 1 AUD = ${live} CNY`),
        e("button",{className:"ghost",style:{padding:"4px 10px",fontSize:12},onClick:()=>setRate(live)},"使用")
      ),
      e("input",{type:"number",value:rate,placeholder:"4.70",onChange:ev=>setRate(ev.target.value),style:{background:"#F3F4F6",border:"none",borderRadius:12,padding:"10px 14px",fontSize:14,width:"100%"}})
    ),
    d({display:"flex",gap:10},
      e("button",{className:"ghost",style:{flex:1},onClick:()=>setStep(existing?0:1)},"上一步"),
      e(GBtn,{style:{flex:2,padding:12},onClick:done},existing?"保存":"开始使用")
    )
  );
}

// ─── EntryForm ────────────────────────────────────────────────────────────
function EntryForm({type,month,setup,onAdd,onCancel,editing,onUpdate}){
  const isI=type==="income",isC=type==="capital",ed=editing;
  const [date,setDate]=useState(ed?.date||month+"-01");
  const [amt,setAmt]=useState(ed?String(ed.amount):"");
  const [cur,setCur]=useState(ed?.currency||setup.baseCurrency);
  const [eRate,setERate]=useState(String(ed?.rateAtEntry||setup.rate));
  const [cat,setCat]=useState(ed?.category||"");
  const [paidBy,setPaidBy]=useState(ed?.paidBy||setup.partners[0]?.id||"");
  const [note,setNote]=useState(ed?.note||"");
  const [flow,setFlow]=useState(ed?.capitalFlow||"partner");
  const [capTo,setCapTo]=useState(ed?.capitalTo||setup.partners[1]?.id||"");

  const iCats=["销售收入","线上销售","退款回收","其他收入"];
  const eCats=["进货","房租","人工","运费","水电","包装","营销","杂费"];
  const rn=Number(eRate)||setup.rate;
  const preview=amt&&cur!==setup.baseCurrency?toBase(amt,cur,setup.baseCurrency,rn):null;

  function buildEntry(){
    const sd=date.startsWith(month)?date:month+"-01";
    const ab=toBase(amt,cur,setup.baseCurrency,rn);
    const base2={date:sd,month,amount:Number(amt),currency:cur,amountBase:ab,rateAtEntry:rn,baseCurrencyAtEntry:setup.baseCurrency,category:cat||"其他",paidBy,note};
    return isC?{...base2,type:"capital",capitalFlow:flow,capitalTo:flow==="partner"?capTo:null}:{...base2,type};
  }
  function submit(){
    if(!amt||!paidBy)return;
    if(editing)onUpdate({...editing,...buildEntry()});
    else{onAdd(buildEntry());setAmt("");setNote("");setCat("");}
  }

  const accent=isI?"#10B981":isC?"#F59E0B":"#F472B6";
  const aLight=isI?"#D1FAE5":isC?"#FEF3C7":"#FCE7F3";
  const title=editing?(isI?"编辑收入":isC?"编辑注资":"编辑支出"):(isI?"录入收入":isC?"录入注资":"录入支出");

  return d({background:"#fff",borderRadius:20,padding:18,marginBottom:14,boxShadow:"0 2px 16px rgba(0,0,0,0.07)"},
    d({display:"flex",alignItems:"center",gap:10,marginBottom:16},
      d({width:36,height:36,borderRadius:10,background:aLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18},isI?"💰":isC?"🏦":"🛍️"),
      e("p",{style:{fontWeight:700,fontSize:15,color:accent}},title)
    ),
    d({display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12},
      d({},e(Lbl,{t:"日期"}),e(Inp,{val:date,set:setDate,type:"date"})),
      d({},e(Lbl,{t:"货币"}),e(CurToggle,{val:cur,set:setCur}))
    ),
    d({marginBottom:12},e(Lbl,{t:`金额 (${cur==="CNY"?"¥":"A$"})`}),e(Inp,{val:amt,set:setAmt,type:"number",ph:"0.00"})),
    d({background:"#F3E8FF",borderRadius:14,padding:12,marginBottom:12},
      e(Lbl,{t:"本笔汇率（1 AUD = ? CNY）"}),
      d({display:"flex",gap:8,alignItems:"center"},
        e("input",{type:"number",value:eRate,placeholder:String(setup.rate),onChange:ev=>setERate(ev.target.value),style:{flex:1,padding:"9px 12px",borderRadius:10,border:"none",background:"#fff",fontSize:14}}),
        e("button",{onClick:()=>setERate(String(setup.rate)),style:{background:"#C084FC",color:"#fff",borderRadius:10,padding:"9px 12px",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}},"默认")
      ),
      preview&&e("p",{style:{fontSize:11,color:"#7C3AED",marginTop:6}},`≈ ${fmtC(preview,setup.baseCurrency)}`)
    ),

// ─── SettleForm ───────────────────────────────────────────────────────────
function SettleForm({allEntries,setup,isMulti,defaultMonths,onAdd,onCancel,rate,rateMode}){
  const candidates=useMemo(()=>ALL_MONTHS.filter(m=>m<=thisMonth()&&allEntries.some(x=>x.month===m&&x.type!=="settlement")),[allEntries]);
  const [selM,setSelM]=useState(isMulti?candidates:defaultMonths||[]);
  const [date,setDate]=useState(today());
  const [note,setNote]=useState("");
  const [custom,setCustom]=useState({});
  const relE=useMemo(()=>allEntries.filter(x=>selM.includes(x.month)),[allEntries,selM]);
  const bal=useMemo(()=>calcBal(relE,setup.partners,rate,rateMode,setup.baseCurrency),[relE,setup.partners,rate,rateMode,setup.baseCurrency]);
  const trs=useMemo(()=>minTr(bal,setup.partners),[bal,setup.partners]);
  const toggle=m=>setSelM(p=>p.includes(m)?p.filter(x=>x!==m):[...p,m]);
  const fa=(key,sug)=>{const r=custom[key];if(r===undefined||r==="")return sug;const n=Number(r);return isNaN(n)||n<0?sug:n;};
  function submit(){
    if(!selM.length)return;
    const lids=[];
    const se=trs.map(t=>{
      const key=t.from+t.to,amt=fa(key,t.amount),eid=uid();
      lids.push(eid);
      return{id:eid,date,month:selM[selM.length-1],type:"settlement",amount:amt,currency:setup.baseCurrency,amountBase:amt,rateAtEntry:rate,baseCurrencyAtEntry:setup.baseCurrency,fromId:t.from,fromName:t.fromName,toId:t.to,toName:t.toName,category:"结算",note,suggestedAmount:t.amount};
    });
    onAdd({months:[...selM].sort(),date,transfers:se.map(x=>({...x})),note,rate,linkedEntryIds:lids},se);
  }
  return d({background:"#fff",borderRadius:20,padding:18,marginBottom:14,boxShadow:"0 2px 16px rgba(0,0,0,0.07)"},
    e("p",{style:{fontWeight:700,fontSize:15,color:"#7C3AED",marginBottom:14}},isMulti?"🔗 合并结算":"✅ 月度结算"),
    d({marginBottom:12},
      e(Lbl,{t:isMulti?"选择月份":"结算月份"}),
      d({display:"flex",flexWrap:"wrap",gap:6},
        ...candidates.map(m=>e("span",{key:m,className:`chip${selM.includes(m)?" on":""}`,onClick:()=>toggle(m)},m)),
        !candidates.length&&e("p",{style:{fontSize:12,color:"#9CA3AF"}},"暂无可结算月份")
      )
    ),
    selM.length>0&&trs.length>0&&d({background:"#F3E8FF",borderRadius:14,padding:14,marginBottom:12},
      e("p",{style:{fontSize:12,color:"#7C3AED",fontWeight:600,marginBottom:10}},`建议方案 · ${selM.length}个月`),
      ...trs.map(t=>{
        const key=t.from+t.to;
        return d({key,marginBottom:12},
          d({display:"flex",justifyContent:"space-between",marginBottom:6},
            e("span",{style:{fontSize:13,fontWeight:600}},t.fromName," → ",t.toName),
            e("span",{style:{fontSize:12,color:"#7C3AED"}},`建议 ${fmtC(t.amount,setup.baseCurrency)}`)
          ),
          d({display:"flex",gap:8,alignItems:"center"},
            e("input",{type:"number",placeholder:fmtN(t.amount),value:custom[key]??"",onChange:ev=>setCustom(p=>({...p,[key]:ev.target.value})),style:{flex:1,padding:"8px 12px",borderRadius:10,border:"none",background:"#fff",fontSize:13}}),
            e("span",{style:{fontSize:12,color:"#7C3AED",whiteSpace:"nowrap"}},setup.baseCurrency)
          ),
          e("p",{style:{fontSize:11,color:"#A78BFA",marginTop:4}},`实际：${fmtC(fa(key,t.amount),setup.baseCurrency)}`)
        );
      })
    ),
    selM.length>0&&trs.length===0&&d({textAlign:"center",padding:14,background:"#F3F4F6",borderRadius:14,marginBottom:12},e("p",{style:{fontSize:13,color:"#6B7280"}},"所选月份无未清余额 🎉")),
    d({display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14},
      d({},e(Lbl,{t:"结算日期"}),e(Inp,{val:date,set:setDate,type:"date"})),
      d({},e(Lbl,{t:"备注"}),e(Inp,{val:note,set:setNote,ph:"可选"}))
    ),
    d({display:"flex",gap:10},
      e(GBtn,{style:{flex:2,padding:11},onClick:submit},"确认结算"),
      e("button",{className:"ghost",style:{flex:1},onClick:onCancel},"取消")
    )
  );
}

      // HISTORY
      tab==="history"&&d({},
        d({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14},
          e("p",{style:{fontWeight:700,fontSize:15}},"结算记录"),
          e(RateToggle,{val:rateMode,set:v=>dp({type:"SET_RATE_MODE",v})})
        ),
        settlements.length===0
          ?d({textAlign:"center",padding:"40px 0"},e("p",{style:{fontSize:32,marginBottom:10}},"📋"),e("p",{style:{color:"#9CA3AF",fontSize:14}},"暂无结算记录"))
          :[...settlements].reverse().map(s=>d({key:s.id,className:"card",marginBottom:12},
            d({display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10},
              d({},
                d({display:"flex",alignItems:"center",gap:6,marginBottom:4},
                  e("span",{className:"tag",style:{background:"#D1FAE5",color:"#065F46"}},(s.months||[]).length>1?`合并 ${s.months.length}月`:"月结"),
                  e("span",{style:{fontSize:12,color:"#9CA3AF"}},s.date),
                  e("span",{style:{fontSize:10,background:"#F3E8FF",color:"#7C3AED",borderRadius:6,padding:"1px 5px",fontWeight:600}},`@${s.rate}`)
                ),
                e("p",{style:{fontSize:11,color:"#9CA3AF"}},(s.months||[]).join("  ·  "))
              ),
              e("button",{className:"ibtn",style:{color:"#F87171"},onClick:()=>dp({type:"CONFIRM_DEL",payload:{kind:"settlement",id:s.id,label:"撤销此结算？关联流水将一并删除"}})},"×")
            ),
            ...(s.transfers||[]).map((t,i)=>d({key:i,display:"flex",justifyContent:"space-between",padding:"8px 0",borderTop:"0.5px solid #F3F4F6"},
              e("span",{style:{fontSize:13}},`${t.fromName} → ${t.toName}`),
              e("span",{style:{fontWeight:700,fontSize:13,color:"#7C3AED"}},fmtC(resBase(t,cur,rateMode,base),base))
            ))
          )),
        d({marginTop:16},
          e("p",{style:{fontWeight:700,fontSize:15,marginBottom:12}},"各月状态"),
          ...ALL_MONTHS.filter(m=>entries.some(x=>x.month===m&&x.type!=="settlement")||settledMs.has(m)).map(m=>{
            const inc=entries.filter(x=>x.month===m&&x.type==="income").reduce((s,x)=>s+resBase(x,cur,rateMode,base),0);
            const exp=entries.filter(x=>x.month===m&&x.type==="expense").reduce((s,x)=>s+resBase(x,cur,rateMode,base),0);
            const settled=settledMs.has(m),fut=m>thisMonth();
            const me=entries.filter(x=>x.month===m);
            const hasBal=!settled&&me.some(x=>x.type!=="settlement")&&minTr(calcBal(me,setup.partners,cur,rateMode,base),setup.partners).some(t=>t.amount>0.05);
            return d({key:m,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"0.5px solid #F3F4F6"},
              d({},e("span",{style:{fontSize:13,fontWeight:600}},m),e("span",{style:{fontSize:11,color:"#9CA3AF",marginLeft:8}},`收${fmtC(inc,base)} 支${fmtC(exp,base)}`)),
              e("span",{className:"tag",style:{background:settled?"#D1FAE5":fut?"#EDE9FE":hasBal?"#FEF3C7":"#F3F4F6",color:settled?"#065F46":fut?"#5B21B6":hasBal?"#92400E":"#9CA3AF"}},settled?"✓ 已结算":fut?"未来":hasBal?"待结算":"无余额")
            );
          })
        )
      ),

      // SETTINGS
      tab==="settings"&&d({},
        d({className:"card",marginBottom:16,border:"1.5px solid #FFE4E6"},
          e("p",{style:{fontWeight:700,marginBottom:6,color:"#F43F5E"}},"⚠️ 危险操作"),
          e("p",{style:{fontSize:12,color:"#9CA3AF",marginBottom:12}},"清空所有记录、结算和设置，恢复初始状态，不可撤销。"),
          e("button",{onClick:()=>dp({type:"CONFIRM_DEL",payload:{kind:"reset",label:"确定要清空所有数据吗？不可撤销！"}}),style:{width:"100%",padding:"11px",borderRadius:14,background:"#FFF1F2",color:"#F43F5E",fontWeight:700,fontSize:14,border:"1.5px solid #FECDD3"}},"🗑️ 清空所有数据，重新开始")
        ),
        d({className:"card",marginBottom:16},
          e("p",{style:{fontWeight:700,marginBottom:6}},"默认汇率"),
          e("p",{style:{fontSize:12,color:"#9CA3AF",marginBottom:12}},"影响新录入记录的默认值；每笔记录可单独修改"),
          live&&d({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F3E8FF",borderRadius:12,marginBottom:10},
            e("span",{style:{fontSize:13,color:"#7C3AED",fontWeight:600}},`实时 1 AUD = ${live} CNY`),
            e("button",{style:{background:"#C084FC",color:"#fff",borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:600},onClick:()=>dp({type:"UPDATE_SETUP",setup:{...setup,rate:Number(live)}})},"使用")
          ),
          (function QuickRate(){
            const [r,setR]=useState(String(setup.rate));
            return d({display:"flex",gap:8},
              e("input",{type:"number",value:r,placeholder:String(setup.rate),onChange:ev=>setR(ev.target.value),style:{flex:1,padding:"10px 14px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14}}),
              e(GBtn,{onClick:()=>{const n=Number(r);if(n>0)dp({type:"UPDATE_SETUP",setup:{...setup,rate:n}});}},"更新")
            );
          })()
        ),
        e("p",{style:{fontWeight:700,fontSize:15,marginBottom:12}},"合伙人 & 货币"),
        e(Setup,{existing:setup,onDone:s=>dp({type:"UPDATE_SETUP",setup:s})})
      )
    ),

    // Bottom tab bar
    d({position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,0.96)",borderTop:"0.5px solid #F3F4F6",display:"flex",padding:"8px 0 16px"},
      ...TABS.map(([id,icon,label])=>e("button",{key:id,onClick:()=>dp({type:"SET_TAB",v:id}),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",padding:"4px 0"}},
        e("span",{style:{fontSize:18,opacity:tab===id?1:0.35}},icon),
        e("span",{style:{fontSize:10,fontWeight:tab===id?700:400,color:tab===id?"#A855F7":"#9CA3AF"}},label),
        tab===id&&d({width:18,height:3,borderRadius:2,background:G,marginTop:1})
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));

}); // end window.load
</script>
</body>
</html>
