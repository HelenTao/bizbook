<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>合伙生意记账</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F9FAFB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
#root{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;position:relative}
input,select{font-family:inherit;font-size:14px;background:#F3F4F6;color:#111827;border:none;border-radius:12px;padding:10px 14px;width:100%;outline:none;transition:box-shadow .15s;-webkit-appearance:none}
input:focus,select:focus{box-shadow:0 0 0 2px #C084FC55}
button{font-family:inherit;cursor:pointer;border:none;transition:transform .1s,opacity .15s}
button:active{transform:scale(0.97)}
.pill{display:flex;background:#F3F4F6;border-radius:20px;padding:3px;gap:2px}
.pill button{border-radius:17px;padding:5px 13px;font-size:12px;background:transparent;color:#6B7280}
.pill button.on{background:#fff;color:#A855F7;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.chip{display:inline-block;padding:5px 13px;border-radius:20px;font-size:12px;background:#F3F4F6;color:#6B7280;cursor:pointer;transition:all .15s;user-select:none}
.chip.on{background:#F3E8FF;color:#9333EA;font-weight:600}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.ghost{border:1.5px solid #E9D5FF;border-radius:12px;padding:9px 16px;background:transparent;color:#A855F7;font-size:13px;font-weight:500;cursor:pointer}
.ghost:hover{background:#FAF5FF}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9CA3AF;margin-bottom:10px}
.lbl{font-size:12px;color:#6B7280;margin-bottom:5px;font-weight:500}
.ibtn{background:none;color:#9CA3AF;padding:4px 8px;font-size:15px;border-radius:8px;cursor:pointer;border:none}
.ibtn:hover{color:#A855F7;background:#F3E8FF}
.gbtn{color:#fff;border-radius:14px;padding:11px 20px;font-weight:600;font-size:14px;border:none;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
const {createElement:h,useState,useReducer,useMemo,useEffect,useCallback,Fragment}=React;
const {PieChart,Pie,Cell,BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer}=Recharts;

const PALETTE=["#C084FC","#F472B6","#FB923C","#34D399","#60A5FA","#FBBF24","#A78BFA","#F87171"];
const G="linear-gradient(135deg,#C084FC,#F472B6)";
const G2="linear-gradient(135deg,#818CF8,#C084FC)";
const clamp=(n,a,b)=>Math.min(b,Math.max(a,n));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const thisMonth=()=>new Date().toISOString().slice(0,7);
function genMonths(){const l=[],now=new Date();for(let i=-6;i<=6;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);l.push(d.toISOString().slice(0,7));}return l;}
const ALL_MONTHS=genMonths();
const fmtN=(n,d=2)=>isNaN(n)?"0.00":Number(n).toFixed(d);
const fmtC=(n,cur)=>cur==="AUD"?`A$${fmtN(n)}`:`¥${fmtN(n)}`;
function toBase(amt,cur,base,rate){const a=Number(amt)||0;if(cur===base)return a;if(base==="CNY"&&cur==="AUD")return a*rate;if(base==="AUD"&&cur==="CNY")return a/rate;return a;}
function resBase(e,rate,mode,base){if(mode==="historical")return e.amountBase;return toBase(e.amount,e.currency,base,rate);}

const SK="bizbook_v5";
const load=()=>{try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch{return null;}};
const save=s=>{try{localStorage.setItem(SK,JSON.stringify(s));}catch{}};

function calcBal(entries,partners,rate,mode,base){
  const op=entries.filter(e=>e.type!=="capital"&&e.type!=="settlement");
  const inc=op.filter(e=>e.type==="income").reduce((s,e)=>s+resBase(e,rate,mode,base),0);
  const exp=op.filter(e=>e.type==="expense").reduce((s,e)=>s+resBase(e,rate,mode,base),0);
  const profit=inc-exp;
  const held={};partners.forEach(p=>held[p.id]=0);
  op.forEach(e=>{if(!e.paidBy||!held.hasOwnProperty(e.paidBy))return;const b=resBase(e,rate,mode,base);if(e.type==="income")held[e.paidBy]+=b;if(e.type==="expense")held[e.paidBy]-=b;});
  entries.filter(e=>e.type==="capital").forEach(e=>{if(!e.paidBy||!held.hasOwnProperty(e.paidBy))return;const b=resBase(e,rate,mode,base);const f=e.capitalFlow||"pool";if(f==="pool")held[e.paidBy]-=b;else if(f==="partner"){held[e.paidBy]-=b;if(e.capitalTo&&held.hasOwnProperty(e.capitalTo))held[e.capitalTo]+=b;}});
  entries.filter(e=>e.type==="settlement").forEach(e=>{if(!e.fromId||!e.toId)return;const b=resBase(e,rate,mode,base);if(held.hasOwnProperty(e.fromId))held[e.fromId]+=b;if(held.hasOwnProperty(e.toId))held[e.toId]-=b;});
  const bal={};partners.forEach(p=>{bal[p.id]=(profit*(p.ratio/100))-held[p.id];});return bal;
}
function minTr(bal,partners){
  const arr=partners.map(p=>({id:p.id,name:p.name,bal:bal[p.id]||0})).sort((a,b)=>a.bal-b.bal);
  const tr=[];let lo=0,hi=arr.length-1;const a=arr.map(x=>({...x}));
  while(lo<hi){const d=a[lo],c=a[hi];if(Math.abs(d.bal)<0.005){lo++;continue;}if(Math.abs(c.bal)<0.005){hi--;continue;}const amt=Math.min(-d.bal,c.bal);if(amt>0.005)tr.push({from:d.id,fromName:d.name,to:c.id,toName:c.name,amount:amt});d.bal+=amt;c.bal-=amt;if(Math.abs(d.bal)<0.005)lo++;if(Math.abs(c.bal)<0.005)hi--;}
  return tr;
}

function initApp(saved){
  if(saved)return{...saved,confirmDel:null,showForm:null,editingEntry:null,showSettle:false,showMerge:false};
  return{setup:null,month:thisMonth(),tab:"dashboard",rateMode:"historical",entries:[],settlements:[],confirmDel:null,showForm:null,editingEntry:null,showSettle:false,showMerge:false};
}
function reducer(s,a){
  let n;
  switch(a.type){
    case "SETUP_DONE":n={...s,setup:a.setup,tab:"dashboard",showForm:null,editingEntry:null};break;
    case "SET_TAB":n={...s,tab:a.v,showForm:null,editingEntry:null,showSettle:false,showMerge:false};break;
    case "SET_MONTH":n={...s,month:a.v};break;
    case "SET_RATE_MODE":n={...s,rateMode:a.v};break;
    case "UPDATE_SETUP":n={...s,setup:a.setup};break;
    case "SHOW_FORM":n={...s,showForm:a.v,editingEntry:null,showSettle:false,showMerge:false};break;
    case "EDIT_ENTRY":n={...s,editingEntry:a.entry,showForm:a.entry.type,showSettle:false,showMerge:false};break;
    case "ADD_ENTRY":n={...s,entries:[...s.entries,{...a.entry,id:uid()}],showForm:null,editingEntry:null};break;
    case "UPDATE_ENTRY":n={...s,entries:s.entries.map(e=>e.id===a.entry.id?a.entry:e),showForm:null,editingEntry:null};break;
    case "DEL_ENTRY":n={...s,entries:s.entries.filter(e=>e.id!==a.id),confirmDel:null};break;
    case "ADD_SETTLEMENT":n={...s,settlements:[...s.settlements,{...a.settlement,id:uid()}],entries:[...s.entries,...a.se],showSettle:false,showMerge:false};break;
    case "DEL_SETTLEMENT":{const lk=s.settlements.find(x=>x.id===a.id)?.linkedEntryIds||[];n={...s,settlements:s.settlements.filter(x=>x.id!==a.id),entries:s.entries.filter(e=>!lk.includes(e.id)),confirmDel:null};break;}
    case "CONFIRM_DEL":n={...s,confirmDel:a.payload};break;
    case "CANCEL_DEL":n={...s,confirmDel:null};break;
    case "RESET":localStorage.removeItem(SK);return initApp(null);
    case "SHOW_SETTLE":n={...s,showSettle:a.v,showForm:null,editingEntry:null,showMerge:false};break;
    case "SHOW_MERGE":n={...s,showMerge:a.v,showForm:null,editingEntry:null,showSettle:false};break;
    default:return s;
  }
  save(n);return n;
}

// ── helpers ──────────────────────────────────────────────────────────────────
const Lbl=({t})=>h("p",{className:"lbl"},t);
const Inp=({val,set,type="text",ph="",style={}})=>h("input",{type,value:val,placeholder:ph,onChange:e=>set(e.target.value),style});
const Sel=({val,set,opts})=>h("select",{value:val,onChange:e=>set(e.target.value)},opts.map(([v,l])=>h("option",{key:v,value:v},l)));
const CurToggle=({val,set})=>h("div",{className:"pill"},[["CNY","¥ CNY"],["AUD","A$ AUD"]].map(([v,l])=>h("button",{key:v,className:val===v?"on":"",onClick:()=>set(v)},l)));
const RateToggle=({val,set})=>h("div",{className:"pill"},[["historical","历史汇率"],["current","当前汇率"]].map(([v,l])=>h("button",{key:v,className:val===v?"on":"",onClick:()=>set(v)},l)));

const Avatar=({name,idx=0,size=36})=>{
  const c=PALETTE[idx%PALETTE.length];
  return h("div",{style:{width:size,height:size,borderRadius:"50%",background:c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.38,fontWeight:700,color:"#fff",flexShrink:0,boxShadow:`0 2px 8px ${c}55`}},(name||"?").slice(0,1).toUpperCase());
};

const GBtn=({children,onClick,style={},g=G})=>h("button",{className:"gbtn",onClick,style:{background:g,boxShadow:"0 4px 14px rgba(192,132,252,0.35)",...style}},children);

const ConfirmDlg=({msg,onOk,onCancel})=>h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:999,padding:"0 16px 32px"}},
  h("div",{className:"card",style:{width:"100%",maxWidth:420}},
    h("p",{style:{fontSize:15,marginBottom:20,textAlign:"center"}},msg),
    h("div",{style:{display:"flex",gap:10}},
      h("button",{className:"ghost",style:{flex:1},onClick:onCancel},"取消"),
      h("button",{style:{flex:1,background:"linear-gradient(135deg,#F87171,#FB923C)",color:"#fff",borderRadius:12,padding:"10px",fontWeight:600,fontSize:14,border:"none",cursor:"pointer"},onClick:onOk},"确认"))));

// ── Setup ─────────────────────────────────────────────────────────────────────
function PartnerStep({partners,resize,up,total,ok,onNext,onBack}){
  return h("div",{style:{width:"100%",maxWidth:380}},
    h("p",{style:{fontSize:20,fontWeight:700,marginBottom:4}},"合伙人"),
    h("p",{style:{fontSize:13,color:"#6B7280",marginBottom:18}},"姓名和持股比例，合计需为100%"),
    h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:16}},
      h("p",{style:{fontSize:13,color:"#6B7280"}},"人数"),
      h("button",{className:"ghost",style:{padding:"4px 12px"},onClick:()=>resize(partners.length-1)},"−"),
      h("span",{style:{fontWeight:700,minWidth:20,textAlign:"center"}},partners.length),
      h("button",{className:"ghost",style:{padding:"4px 12px"},onClick:()=>resize(partners.length+1)},"+")
    ),
    partners.map((p,i)=>h("div",{key:p.id,style:{display:"flex",gap:10,marginBottom:10,alignItems:"center"}},
      h(Avatar,{name:p.name||String(i+1),idx:i,size:36}),
      h("input",{value:p.name,placeholder:`合伙人 ${i+1}`,onChange:e=>up(p.id,"name",e.target.value),style:{flex:2,padding:"10px 14px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14}}),
      h("input",{type:"number",value:p.ratio,onChange:e=>up(p.id,"ratio",e.target.value),style:{width:60,padding:"10px 8px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14,textAlign:"center"}}),
      h("span",{style:{fontSize:13,color:"#6B7280"}},"%")
    )),
    h("p",{style:{fontSize:12,color:total===100?"#10B981":"#F87171",marginTop:6,marginBottom:20,fontWeight:600}},`合计 ${total}% ${total===100?"✓":"（需等于100%）"}`),
    h("div",{style:{display:"flex",gap:10}},
      onBack&&h("button",{className:"ghost",style:{flex:1},onClick:onBack},"上一步"),
      h(GBtn,{style:{flex:2,padding:12},onClick:()=>ok&&onNext(),g:ok?G:"linear-gradient(135deg,#D1D5DB,#9CA3AF)"},"下一步")
    )
  );
}

function CurrencyStep({base,setBase,rate,setRate,liveRate,onDone,onBack}){
  return h("div",{style:{width:"100%",maxWidth:380}},
    h("p",{style:{fontSize:20,fontWeight:700,marginBottom:4}},"货币 & 汇率"),
    h("p",{style:{fontSize:13,color:"#6B7280",marginBottom:18}},"主要结算货币和默认汇率"),
    h("div",{style:{marginBottom:16}},
      h(Lbl,{t:"主要结算货币"}),
      h("div",{style:{display:"flex",gap:10}},
        [["CNY","人民币 ¥"],["AUD","澳币 A$"]].map(([v,l])=>h("button",{key:v,onClick:()=>setBase(v),style:{flex:1,padding:"12px",borderRadius:14,background:base===v?G:"#F3F4F6",color:base===v?"#fff":"#6B7280",fontWeight:base===v?700:400,fontSize:14,boxShadow:base===v?"0 4px 12px rgba(192,132,252,0.3)":"none",border:"none",cursor:"pointer"}},l))
      )
    ),
    h("div",{style:{marginBottom:20}},
      h(Lbl,{t:"默认汇率（1 AUD = ? CNY）"}),
      liveRate&&h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F3E8FF",borderRadius:12,marginBottom:8}},
        h("span",{style:{fontSize:13,color:"#7C3AED",fontWeight:500}},`实时 1 AUD = ${liveRate} CNY`),
        h("button",{className:"ghost",style:{padding:"4px 10px",fontSize:12},onClick:()=>setRate(liveRate)},"使用")
      ),
      h("input",{type:"number",value:rate,placeholder:"4.70",onChange:e=>setRate(e.target.value),style:{background:"#F3F4F6",border:"none",borderRadius:12,padding:"10px 14px",fontSize:14,width:"100%"}})
    ),
    h("div",{style:{display:"flex",gap:10}},
      onBack&&h("button",{className:"ghost",style:{flex:1},onClick:onBack},"上一步"),
      h(GBtn,{style:{flex:2,padding:12},onClick:onDone},onBack?"开始使用":"保存")
    )
  );
}

function Setup({onDone,existing}){
  const [step,setStep]=useState(0);
  const [partners,setPartners]=useState(existing?.partners||[{id:uid(),name:"",ratio:50},{id:uid(),name:"",ratio:50}]);
  const [base,setBase]=useState(existing?.baseCurrency||"CNY");
  const [rate,setRate]=useState(String(existing?.rate||4.70));
  const [liveRate,setLiveRate]=useState(null);
  useEffect(()=>{fetch("https://api.frankfurter.app/latest?from=AUD&to=CNY").then(r=>r.json()).then(d=>{if(d?.rates?.CNY)setLiveRate(Number(d.rates.CNY).toFixed(4));}).catch(()=>{});},[]);
  const total=partners.reduce((s,p)=>s+Number(p.ratio||0),0);
  const up=(id,f,v)=>setPartners(ps=>ps.map(p=>p.id===id?{...p,[f]:v}:p));
  const resize=n=>{const count=clamp(n,2,8);const b=Math.floor(100/count),rem=100-b*(count-1);setPartners(Array.from({length:count},(_,i)=>({id:partners[i]?.id||uid(),name:partners[i]?.name||"",ratio:i===count-1?rem:b})));};
  const ok=partners.every(p=>p.name.trim())&&total===100;
  const done=()=>onDone({partners,baseCurrency:base,rate:Number(rate)||4.7});

  if(!existing) return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",background:"#fff"}},
    step===0&&h("div",{style:{width:"100%",maxWidth:380,textAlign:"center"}},
      h("div",{style:{width:72,height:72,borderRadius:22,background:G,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,margin:"0 auto 20px",boxShadow:"0 8px 24px rgba(192,132,252,0.4)"}},"🤝"),
      h("p",{style:{fontSize:26,fontWeight:700,marginBottom:8}},"合伙生意记账"),
      h("p",{style:{fontSize:14,color:"#6B7280",marginBottom:32,lineHeight:1.6}},"澳洲华人合伙小生意",h("br"),"多人分账 · 双币种 · 灵活结算"),
      h(GBtn,{style:{width:"100%",padding:14,fontSize:15,borderRadius:16},onClick:()=>setStep(1)},"开始设置")
    ),
    step===1&&h(PartnerStep,{partners,resize,up,total,ok,onNext:()=>setStep(2),onBack:()=>setStep(0)}),
    step===2&&h(CurrencyStep,{base,setBase,rate,setRate,liveRate,onDone:done,onBack:()=>setStep(1)})
  );
  return h("div",null,
    step===0&&h(PartnerStep,{partners,resize,up,total,ok,onNext:()=>setStep(1),onBack:null}),
    step===1&&h(CurrencyStep,{base,setBase,rate,setRate,liveRate,onDone:done,onBack:()=>setStep(0)})
  );
}

// ── EntryForm ──────────────────────────────────────────────────────────────────
function EntryForm({type,month,setup,onAdd,onCancel,editing,onUpdate}){
  const isIncome=type==="income",isCapital=type==="capital",ed=editing;
  const [date,setDate]=useState(ed?.date||month+"-01");
  const [amt,setAmt]=useState(ed?String(ed.amount):"");
  const [cur,setCur]=useState(ed?.currency||setup.baseCurrency);
  const [eRate,setERate]=useState(String(ed?.rateAtEntry||setup.rate));
  const [cat,setCat]=useState(ed?.category||"");
  const [paidBy,setPaidBy]=useState(ed?.paidBy||setup.partners[0]?.id||"");
  const [note,setNote]=useState(ed?.note||"");
  const [flow,setFlow]=useState(ed?.capitalFlow||"partner");
  const [capTo,setCapTo]=useState(ed?.capitalTo||setup.partners[1]?.id||"");
  const incomeCats=["销售收入","线上销售","退款回收","其他收入"];
  const expenseCats=["进货","房租","人工","运费","水电","包装","营销","杂费"];
  const rn=Number(eRate)||setup.rate;
  const preview=amt&&cur!==setup.baseCurrency?toBase(amt,cur,setup.baseCurrency,rn):null;
  const build=()=>{
    const sd=date.startsWith(month)?date:month+"-01";
    const ab=toBase(amt,cur,setup.baseCurrency,rn);
    const base2={date:sd,month,amount:Number(amt),currency:cur,amountBase:ab,rateAtEntry:rn,baseCurrencyAtEntry:setup.baseCurrency,category:cat||"其他",paidBy,note};
    return isCapital?{...base2,type:"capital",capitalFlow:flow,capitalTo:flow==="partner"?capTo:null}:{...base2,type};
  };
  const submit=()=>{if(!amt||!paidBy)return;if(editing)onUpdate({...editing,...build()});else{onAdd(build());setAmt("");setNote("");setCat("");}};
  const accent=isIncome?"#10B981":isCapital?"#F59E0B":"#F472B6";
  const accentLight=isIncome?"#D1FAE5":isCapital?"#FEF3C7":"#FCE7F3";
  const title=editing?(isIncome?"编辑收入":isCapital?"编辑注资":"编辑支出"):(isIncome?"录入收入":isCapital?"录入注资":"录入支出");
  const emoji=isIncome?"💰":isCapital?"🏦":"🛍️";

  return h("div",{style:{background:"#fff",borderRadius:20,padding:18,marginBottom:14,boxShadow:"0 2px 16px rgba(0,0,0,0.07)"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},
      h("div",{style:{width:36,height:36,borderRadius:10,background:accentLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},emoji),
      h("p",{style:{fontWeight:700,fontSize:15,color:accent}},title)
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
      h("div",null,h(Lbl,{t:"日期"}),h(Inp,{val:date,set:setDate,type:"date"})),
      h("div",null,h(Lbl,{t:"货币"}),h(CurToggle,{val:cur,set:setCur}))
    ),
    h("div",{style:{marginBottom:12}},h(Lbl,{t:`金额 (${cur==="CNY"?"¥":"A$"})`}),h(Inp,{val:amt,set:setAmt,type:"number",ph:"0.00"})),
    h("div",{style:{background:"#F3E8FF",borderRadius:14,padding:12,marginBottom:12}},
      h(Lbl,{t:"本笔汇率（1 AUD = ? CNY）"}),
      h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
        h("input",{type:"number",value:eRate,placeholder:String(setup.rate),onChange:e=>setERate(e.target.value),style:{flex:1,padding:"9px 12px",borderRadius:10,border:"none",background:"#fff",fontSize:14}}),
        h("button",{style:{background:"#C084FC",color:"#fff",borderRadius:10,padding:"9px 12px",fontSize:12,fontWeight:600,whiteSpace:"nowrap",border:"none",cursor:"pointer"},onClick:()=>setERate(String(setup.rate))},"默认")
      ),
      preview&&h("p",{style:{fontSize:11,color:"#7C3AED",marginTop:6,fontWeight:500}},`≈ ${fmtC(preview,setup.baseCurrency)}`)
    ),
    !isCapital&&h("div",{style:{marginBottom:12}},
      h(Lbl,{t:"分类"}),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}},
        (isIncome?incomeCats:expenseCats).map(c=>h("span",{key:c,className:`chip${cat===c?" on":""}`,onClick:()=>setCat(cat===c?"":c)},c))
      ),
      h(Inp,{val:cat,set:setCat,ph:"自定义分类..."})
    ),
    isCapital&&h("div",{style:{marginBottom:12}},
      h(Lbl,{t:"资金流向"}),
      h("div",{style:{display:"flex",flexDirection:"column",gap:6,marginBottom:10}},

function SettleForm({allEntries,setup,isMulti,defaultMonths,onAdd,onCancel,rate,rateMode}){
  const candidates=useMemo(()=>ALL_MONTHS.filter(m=>m<=thisMonth()&&allEntries.some(e=>e.month===m&&e.type!=="settlement")),[allEntries]);
  const [selMonths,setSelMonths]=useState(isMulti?candidates:defaultMonths||[]);
  const [date,setDate]=useState(today());
  const [note,setNote]=useState("");
  const [custom,setCustom]=useState({});
  const relE=useMemo(()=>allEntries.filter(e=>selMonths.includes(e.month)),[allEntries,selMonths]);
  const bal=useMemo(()=>calcBal(relE,setup.partners,rate,rateMode,setup.baseCurrency),[relE,setup.partners,rate,rateMode,setup.baseCurrency]);
  const transfers=useMemo(()=>minTr(bal,setup.partners),[bal,setup.partners]);
  const toggle=m=>setSelMonths(p=>p.includes(m)?p.filter(x=>x!==m):[...p,m]);
  const finalAmt=(key,sug)=>{const r=custom[key];if(r===undefined||r==="")return sug;const n=Number(r);return isNaN(n)||n<0?sug:n;};
  const submit=()=>{
    if(!selMonths.length)return;
    const lids=[];
    const se=transfers.map(t=>{const key=t.from+t.to,amt=finalAmt(key,t.amount),eid=uid();lids.push(eid);
      return{id:eid,date,month:selMonths[selMonths.length-1],type:"settlement",amount:amt,currency:setup.baseCurrency,amountBase:amt,rateAtEntry:rate,baseCurrencyAtEntry:setup.baseCurrency,fromId:t.from,fromName:t.fromName,toId:t.to,toName:t.toName,category:"结算",note,suggestedAmount:t.amount};});
    onAdd({months:[...selMonths].sort(),date,transfers:se.map(e=>({...e})),note,rate,linkedEntryIds:lids},se);
  };
  return h("div",{style:{background:"#fff",borderRadius:20,padding:18,marginBottom:14,boxShadow:"0 2px 16px rgba(0,0,0,0.07)"}},

    h("div",{style:{marginBottom:12}},

        !candidates.length&&h("p",{style:{fontSize:12,color:"#9CA3AF"}},"暂无可结算月份")
      )
    ),
    selMonths.length>0&&transfers.length>0&&h("div",{style:{background:"#F3E8FF",borderRadius:14,padding:14,marginBottom:12}},
      h("p",{style:{fontSize:12,color:"#7C3AED",fontWeight:600,marginBottom:10}},`建议方案 · ${selMonths.length}个月`),
      transfers.map(t=>{const key=t.from+t.to;return h("div",{key,style:{marginBottom:12}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
          h("span",{style:{fontSize:13,fontWeight:600}},t.fromName," ",h("span",{style:{color:"#A78BFA"}},"→")," ",t.toName),
          h("span",{style:{fontSize:12,color:"#7C3AED"}},`建议 ${fmtC(t.amount,setup.baseCurrency)}`)
        ),
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},

        ),

      );})

            h("span",{style:{fontSize:13,fontWeight:700,color:b>0.01?"#10B981":b<-0.01?"#F43F5E":"#9CA3AF"}},b>0.01?`↑ ${fmtC(b,base)}`:b<-0.01?`↓ ${fmtC(Math.abs(b),base)}`:"持平")
          );}),
          isSettled&&D({style:{marginTop:14,padding:"10px 14px",background:"#D1FAE5",borderRadius:12}},
            h("p",{style:{fontSize:13,color:"#065F46",fontWeight:700}},"✓ 本月已结算"),
            settlements.filter(x=>(x.months||[]).includes(month)).map(x=>h("p",{key:x.id,style:{fontSize:11,color:"#047857",marginTop:2}},x.date,x.months.length>1?` · 合并(${x.months.length}月)`:"",x.note?` · ${x.note}`:""))
          )
        )
      ),

      // HISTORY
      tab==="history"&&D({},
        D({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
          h("p",{style:{fontWeight:700,fontSize:15}},"结算记录"),
          h(RateToggle,{val:rateMode,set:v=>dispatch({type:"SET_RATE_MODE",v})})
        ),
        settlements.length===0
          ?D({style:{textAlign:"center",padding:"40px 0"}},h("p",{style:{fontSize:32,marginBottom:10}},"📋"),h("p",{style:{color:"#9CA3AF",fontSize:14}},"暂无结算记录"))
          :[...settlements].reverse().map(s=>D({key:s.id,className:"card",style:{marginBottom:12}},
            D({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
              D({},
                D({style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
                  h("span",{className:"tag",style:{background:"#D1FAE5",color:"#065F46"}},(s.months||[]).length>1?`合并 ${s.months.length}月`:"月结"),
                  h("span",{style:{fontSize:12,color:"#9CA3AF"}},s.date),
                  h("span",{style:{fontSize:10,background:"#F3E8FF",color:"#7C3AED",borderRadius:6,padding:"1px 5px",fontWeight:600}},`@${s.rate}`)
                ),
                h("p",{style:{fontSize:11,color:"#9CA3AF"}},(s.months||[]).join("  ·  "))
              ),
              h("button",{className:"ibtn",style:{color:"#F87171"},onClick:()=>dispatch({type:"CONFIRM_DEL",payload:{kind:"settlement",id:s.id,label:"撤销此结算？关联流水将一并删除"}})},"×")
            ),
            (s.transfers||[]).map((t,i)=>D({key:i,style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderTop:"0.5px solid #F3F4F6"}},
              h("span",{style:{fontSize:13}},t.fromName," ",h("span",{style:{color:"#A78BFA"}},"→")," ",t.toName),
              h("span",{style:{fontWeight:700,fontSize:13,color:"#7C3AED"}},fmtC(resBase(t,cur,rateMode,base),base))
            ))
          )),
        D({style:{marginTop:6}},
          h("p",{style:{fontWeight:700,fontSize:15,marginBottom:12}},"各月状态"),
          ALL_MONTHS.filter(m=>entries.some(e=>e.month===m&&e.type!=="settlement")||settledMs.has(m)).map(m=>{
            const inc=entries.filter(e=>e.month===m&&e.type==="income").reduce((s,e)=>s+resBase(e,cur,rateMode,base),0);
            const exp=entries.filter(e=>e.month===m&&e.type==="expense").reduce((s,e)=>s+resBase(e,cur,rateMode,base),0);
            const settled=settledMs.has(m),fut=m>thisMonth();
            const me=entries.filter(e=>e.month===m);
            const hasBal=!settled&&me.some(e=>e.type!=="settlement")&&minTr(calcBal(me,setup.partners,cur,rateMode,base),setup.partners).some(t=>t.amount>0.05);
            return D({key:m,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"0.5px solid #F3F4F6"}},
              D({},h("span",{style:{fontSize:13,fontWeight:600}},m),h("span",{style:{fontSize:11,color:"#9CA3AF",marginLeft:8}},`收${fmtC(inc,base)} 支${fmtC(exp,base)}`)),
              h("span",{className:"tag",style:{background:settled?"#D1FAE5":fut?"#EDE9FE":hasBal?"#FEF3C7":"#F3F4F6",color:settled?"#065F46":fut?"#5B21B6":hasBal?"#92400E":"#9CA3AF"}},settled?"✓ 已结算":fut?"未来":hasBal?"待结算":"无余额")
            );
          })
        )
      ),

      // SETTINGS
      tab==="settings"&&D({},
        D({className:"card",style:{marginBottom:16,border:"1.5px solid #FFE4E6"}},
          h("p",{style:{fontWeight:700,marginBottom:6,color:"#F43F5E"}},"⚠️ 危险操作"),
          h("p",{style:{fontSize:12,color:"#9CA3AF",marginBottom:12}},"清空所有记录、结算和设置，恢复初始状态。不可撤销。"),
          h("button",{onClick:()=>dispatch({type:"CONFIRM_DEL",payload:{kind:"reset",label:"确定要清空所有数据吗？此操作无法撤销！"}}),style:{width:"100%",padding:"11px",borderRadius:14,background:"#FFF1F2",color:"#F43F5E",fontWeight:700,fontSize:14,border:"1.5px solid #FECDD3",cursor:"pointer"}},"🗑️ 清空所有数据，重新开始")
        ),
        D({className:"card",style:{marginBottom:16}},
          h("p",{style:{fontWeight:700,marginBottom:6}},"默认汇率"),
          h("p",{style:{fontSize:12,color:"#9CA3AF",marginBottom:12}},"影响新录入记录的默认值；每笔记录可单独修改"),
          liveRate&&D({style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F3E8FF",borderRadius:12,marginBottom:10}},
            h("span",{style:{fontSize:13,color:"#7C3AED",fontWeight:600}},`实时 1 AUD = ${liveRate} CNY`),
            h("button",{style:{background:"#C084FC",color:"#fff",borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:600,border:"none",cursor:"pointer"},onClick:()=>dispatch({type:"UPDATE_SETUP",setup:{...setup,rate:Number(liveRate)}})},"使用")
          ),
          h(QuickRate,{setup,dispatch})
        ),
        h("p",{style:{fontWeight:700,fontSize:15,marginBottom:12}},"合伙人 & 货币"),
        h(Setup,{existing:setup,onDone:s=>dispatch({type:"UPDATE_SETUP",setup:s})})
      )
    ),

    // bottom tab bar
    D({style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,0.95)",borderTop:"0.5px solid #F3F4F6",display:"flex",padding:"8px 0 16px"}},
      TABS.map(([id,icon,label])=>h("button",{key:id,onClick:()=>dispatch({type:"SET_TAB",v:id}),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",padding:"4px 0",border:"none",cursor:"pointer"}},
        h("span",{style:{fontSize:18,filter:tab===id?"none":"grayscale(1)",opacity:tab===id?1:0.35}},icon),
        h("span",{style:{fontSize:10,fontWeight:tab===id?700:400,color:tab===id?"#A855F7":"#9CA3AF"}},label),
        tab===id&&D({style:{width:18,height:3,borderRadius:2,background:G,marginTop:1}})
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
