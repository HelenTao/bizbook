<script>
(function() {
function waitForDeps(cb) {
  if (window.React && window.ReactDOM) { cb(); return; }
  var t = 0;
  var iv = setInterval(function() {
    t++;
    if (window.React && window.ReactDOM) { clearInterval(iv); cb(); }
    else if (t > 50) { clearInterval(iv); document.getElementById('root').innerHTML = '<p style="padding:40px;color:red">依赖库加载失败，请刷新页面</p>'; }
  }, 100);
}

waitForDeps(function() {
var e = React.createElement;
var useState = React.useState;
var useReducer = React.useReducer;
var useMemo = React.useMemo;
var useEffect = React.useEffect;
var RC = window.Recharts || {};
var hasCharts = !!(RC.ResponsiveContainer && RC.BarChart && RC.PieChart);

var PALETTE = ["#C084FC","#F472B6","#FB923C","#34D399","#60A5FA","#FBBF24","#A78BFA","#F87171"];
var G = "linear-gradient(135deg,#C084FC,#F472B6)";
var G2 = "linear-gradient(135deg,#818CF8,#C084FC)";

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }
function thisMonth() { return new Date().toISOString().slice(0,7); }
function genMonths() {
  var list = [], now = new Date();
  for (var i = -6; i <= 6; i++) {
    var d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    list.push(d.toISOString().slice(0,7));
  }
  return list;
}
var ALL_MONTHS = genMonths();
function fmtN(n,d) { d=d||2; return isNaN(Number(n))?"0.00":Number(n).toFixed(d); }
function fmtC(n,cur) { return cur==="AUD"?"A$"+fmtN(n):"¥"+fmtN(n); }
function toBase(amt,cur,base,rate) {
  var a=Number(amt)||0;
  if(cur===base) return a;
  if(base==="CNY"&&cur==="AUD") return a*(Number(rate)||1);
  if(base==="AUD"&&cur==="CNY") return a/(Number(rate)||1);
  return a;
}
function resBase(entry,rate,mode,base) {
  if(mode==="historical") return entry.amountBase||0;
  return toBase(entry.amount,entry.currency,base,rate);
}

var SK="bizbook_v5";
function loadSt(){try{var s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch(err){return null;}}
function saveSt(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(err){}}

function calcBal(entries,partners,rate,mode,base) {
  var op=entries.filter(function(x){return x.type!=="capital"&&x.type!=="settlement";});
  var inc=op.filter(function(x){return x.type==="income";}).reduce(function(s,x){return s+resBase(x,rate,mode,base);},0);
  var exp=op.filter(function(x){return x.type==="expense";}).reduce(function(s,x){return s+resBase(x,rate,mode,base);},0);
  var profit=inc-exp;
  var held={};
  partners.forEach(function(p){held[p.id]=0;});
  op.forEach(function(x){
    if(!x.paidBy||!held.hasOwnProperty(x.paidBy))return;
    var b=resBase(x,rate,mode,base);
    if(x.type==="income")held[x.paidBy]+=b;
    if(x.type==="expense")held[x.paidBy]-=b;
  });
  entries.filter(function(x){return x.type==="capital"&&(x.capitalFlow||"pool")==="pool";}).forEach(function(x){
    if(!x.paidBy||!held.hasOwnProperty(x.paidBy))return;
    held[x.paidBy]-=resBase(x,rate,mode,base);
  });
  entries.filter(function(x){return x.type==="settlement";}).forEach(function(x){
    if(!x.fromId||!x.toId)return;
    var b=resBase(x,rate,mode,base);
    if(held.hasOwnProperty(x.fromId))held[x.fromId]+=b;
    if(held.hasOwnProperty(x.toId))held[x.toId]-=b;
  });
  var bal={};
  partners.forEach(function(p){bal[p.id]=(profit*(p.ratio/100))-held[p.id];});
  return bal;
}

function getCapitalLoans(entries,partners,rate,mode,base) {
  var loans={};
  entries.filter(function(x){return x.type==="capital"&&x.capitalFlow==="partner"&&x.paidBy&&x.capitalTo&&x.capitalTo!==x.paidBy;}).forEach(function(x){
    var b=resBase(x,rate,mode,base);
    var key=x.capitalTo+"_"+x.paidBy;
    loans[key]=(loans[key]||0)+b;
  });
  var result=[];
  var keys=Object.keys(loans);
  for(var i=0;i<keys.length;i++){
    var key=keys[i];
    var amt=loans[key];
    if(amt<=0.005)continue;
    var parts=key.split("_");
    var borrowerId=parts[0], lenderId=parts[1];
    var fromName="?", toName="?";
    for(var j=0;j<partners.length;j++){
      if(partners[j].id===borrowerId)fromName=partners[j].name;
      if(partners[j].id===lenderId)toName=partners[j].name;
    }
    result.push({from:borrowerId,fromName:fromName,to:lenderId,toName:toName,amount:amt,isLoan:true});
  }
  return result;
}

function minTr(bal,partners) {
  var arr=partners.map(function(p){return{id:p.id,name:p.name,bal:bal[p.id]||0};});
  arr.sort(function(a,b){return a.bal-b.bal;});
  var tr=[],lo=0,hi=arr.length-1;
  var a=arr.map(function(x){return{id:x.id,name:x.name,bal:x.bal};});
  while(lo<hi){
    var d=a[lo],c=a[hi];
    if(Math.abs(d.bal)<0.005){lo++;continue;}
    if(Math.abs(c.bal)<0.005){hi--;continue;}
    var amt=Math.min(-d.bal,c.bal);
    if(amt>0.005)tr.push({from:d.id,fromName:d.name,to:c.id,toName:c.name,amount:amt});
    d.bal+=amt;c.bal-=amt;
    if(Math.abs(d.bal)<0.005)lo++;
    if(Math.abs(c.bal)<0.005)hi--;
  }
  return tr;
}

function mergeTransfers(profitTrs,loanTrs,partners) {
  var net={};
  partners.forEach(function(p){net[p.id]=0;});
  profitTrs.forEach(function(t){net[t.from]-=t.amount;net[t.to]+=t.amount;});
  loanTrs.forEach(function(t){net[t.from]-=t.amount;net[t.to]+=t.amount;});
  var arr=partners.map(function(p){return{id:p.id,name:p.name,bal:net[p.id]||0};});
  arr.sort(function(a,b){return a.bal-b.bal;});
  var tr=[],lo=0,hi=arr.length-1;
  var a=arr.map(function(x){return{id:x.id,name:x.name,bal:x.bal};});
  while(lo<hi){
    var d=a[lo],c=a[hi];
    if(Math.abs(d.bal)<0.005){lo++;continue;}
    if(Math.abs(c.bal)<0.005){hi--;continue;}
    var amt=Math.min(-d.bal,c.bal);
    if(amt>0.005)tr.push({from:d.id,fromName:d.name,to:c.id,toName:c.name,amount:amt});
    d.bal+=amt;c.bal-=amt;
    if(Math.abs(d.bal)<0.005)lo++;
    if(Math.abs(c.bal)<0.005)hi--;
  }
  return tr;
}

function initApp(saved) {
  var base={setup:null,month:thisMonth(),tab:"dashboard",rateMode:"historical",entries:[],settlements:[],confirmDel:null,showForm:null,editingEntry:null,showSettle:false,showMerge:false};
  if(!saved)return base;
  return Object.assign({},base,saved,{confirmDel:null,showForm:null,editingEntry:null,showSettle:false,showMerge:false});
}

function reducer(s,a) {
  var n;
  switch(a.type){
    case "SETUP_DONE": n=Object.assign({},s,{setup:a.setup,tab:"dashboard",showForm:null,editingEntry:null});break;
    case "SET_TAB": n=Object.assign({},s,{tab:a.v,showForm:null,editingEntry:null,showSettle:false,showMerge:false});break;
    case "SET_MONTH": n=Object.assign({},s,{month:a.v});break;
    case "SET_RATE_MODE": n=Object.assign({},s,{rateMode:a.v});break;
    case "UPDATE_SETUP": n=Object.assign({},s,{setup:a.setup});break;
    case "SHOW_FORM": n=Object.assign({},s,{showForm:a.v,editingEntry:null,showSettle:false,showMerge:false});break;
    case "EDIT_ENTRY": n=Object.assign({},s,{editingEntry:a.entry,showForm:a.entry.type,showSettle:false,showMerge:false});break;
    case "ADD_ENTRY": n=Object.assign({},s,{entries:s.entries.concat([Object.assign({},a.entry,{id:uid()})]),showForm:null,editingEntry:null});break;
    case "UPDATE_ENTRY": n=Object.assign({},s,{entries:s.entries.map(function(x){return x.id===a.entry.id?a.entry:x;}),showForm:null,editingEntry:null});break;
    case "DEL_ENTRY": n=Object.assign({},s,{entries:s.entries.filter(function(x){return x.id!==a.id;}),confirmDel:null});break;
    case "ADD_SETTLEMENT": n=Object.assign({},s,{settlements:s.settlements.concat([Object.assign({},a.settlement,{id:uid()})]),entries:s.entries.concat(a.se),showSettle:false,showMerge:false});break;
    case "DEL_SETTLEMENT": {
      var lk=(s.settlements.find(function(x){return x.id===a.id;})||{}).linkedEntryIds||[];
      n=Object.assign({},s,{settlements:s.settlements.filter(function(x){return x.id!==a.id;}),entries:s.entries.filter(function(x){return lk.indexOf(x.id)===-1;}),confirmDel:null});break;
    }
    case "CONFIRM_DEL": n=Object.assign({},s,{confirmDel:a.payload});break;
    case "CANCEL_DEL": n=Object.assign({},s,{confirmDel:null});break;
    case "RESET": localStorage.removeItem(SK);return initApp(null);
    case "SHOW_SETTLE": n=Object.assign({},s,{showSettle:a.v,showForm:null,editingEntry:null,showMerge:false});break;
    case "SHOW_MERGE": n=Object.assign({},s,{showMerge:a.v,showForm:null,editingEntry:null,showSettle:false});break;
    default: return s;
  }
  saveSt(n);return n;
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function div(style) {
  var children=[];
  for(var i=1;i<arguments.length;i++){if(arguments[i]!==null&&arguments[i]!==undefined&&arguments[i]!==false)children.push(arguments[i]);}
  return e("div",{style:style},children);
}
function Lbl(p){return e("p",{className:"lbl"},p.t);}
function Inp(p){return e("input",{type:p.type||"text",value:p.val,placeholder:p.ph||"",onChange:function(ev){p.set(ev.target.value);},style:p.style||{}});}
function Sel(p){return e("select",{value:p.val,onChange:function(ev){p.set(ev.target.value);}},p.opts.map(function(o){return e("option",{key:o[0],value:o[0]},o[1]);}));}
function CurToggle(p){return e("div",{className:"pill"},e("button",{className:p.val==="CNY"?"on":"",onClick:function(){p.set("CNY");}},"¥ CNY"),e("button",{className:p.val==="AUD"?"on":"",onClick:function(){p.set("AUD");}},"A$ AUD"));}
function RateToggle(p){return e("div",{className:"pill"},e("button",{className:p.val==="historical"?"on":"",onClick:function(){p.set("historical");}},"历史汇率"),e("button",{className:p.val==="current"?"on":"",onClick:function(){p.set("current");}},"当前汇率"));}
function Avatar(p){

// ── Setup ─────────────────────────────────────────────────────────────────────
function Setup(p) {
  var onDone=p.onDone,existing=p.existing;
  var ss=useState(0);var step=ss[0];var setStep=ss[1];
  var initP=existing&&existing.partners?existing.partners:[{id:uid(),name:"",ratio:50},{id:uid(),name:"",ratio:50}];
  var ps=useState(initP);var partners=ps[0];var setPartners=ps[1];
  var bs=useState(existing?existing.baseCurrency||"CNY":"CNY");var base=bs[0];var setBase=bs[1];
  var rs=useState(String(existing?existing.rate||4.70:4.70));var rate=rs[0];var setRate=rs[1];
  var ls=useState(null);var live=ls[0];var setLive=ls[1];
  useEffect(function(){
    fetch("https://api.frankfurter.app/latest?from=AUD&to=CNY")
      .then(function(r){return r.json();})
      .then(function(data){if(data&&data.rates&&data.rates.CNY)setLive(Number(data.rates.CNY).toFixed(4));})
      .catch(function(){});
  },[]);
  var total=partners.reduce(function(s,p){return s+Number(p.ratio||0);},0);
  function upP(id,f,v){setPartners(function(ps){return ps.map(function(p){return p.id===id?Object.assign({},p,(f==="name"?{name:v}:{ratio:v})):p;});});}
  function resize(n){
    var count=Math.min(8,Math.max(2,n));
    var b=Math.floor(100/count),rem=100-b*(count-1);
    var newP=[];
    for(var i=0;i<count;i++)newP.push({id:(partners[i]&&partners[i].id)||uid(),name:(partners[i]&&partners[i].name)||"",ratio:i===count-1?rem:b});
    setPartners(newP);
  }
  var ok=partners.every(function(p){return p.name.trim();})&&total===100;
  function done(){onDone({partners:partners,baseCurrency:base,rate:Number(rate)||4.7});}
  var nextStep=existing?1:2;
  if(!existing&&step===0){
    return div({minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",background:"#fff"},
      div({width:72,height:72,borderRadius:22,background:G,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,margin:"0 auto 20px",boxShadow:"0 8px 24px rgba(192,132,252,0.4)"},"🤝"),
      e("p",{style:{fontSize:26,fontWeight:700,marginBottom:8}},"合伙生意记账"),
      e("p",{style:{fontSize:14,color:"#6B7280",marginBottom:32,lineHeight:1.6,textAlign:"center"}},"澳洲华人合伙小生意",e("br"),"多人分账 · 双币种 · 灵活结算"),
      e(GBtn,{style:{width:"100%",padding:14,fontSize:15,borderRadius:16},onClick:function(){setStep(1);}},"开始设置")
    );
  }
  if(step===(existing?0:1)){
    return div({width:"100%",maxWidth:380,margin:"0 auto",padding:"20px 0"},
      e("p",{style:{fontSize:20,fontWeight:700,marginBottom:4}},"合伙人"),
      e("p",{style:{fontSize:13,color:"#6B7280",marginBottom:18}},"姓名和持股比例，合计需为100%"),
      div({display:"flex",alignItems:"center",gap:12,marginBottom:16},
        e("p",{style:{fontSize:13,color:"#6B7280"}},"人数"),
        e("button",{className:"ghost",style:{padding:"4px 12px"},onClick:function(){resize(partners.length-1);}},"−"),
        e("span",{style:{fontWeight:700,minWidth:20,textAlign:"center"}},partners.length),
        e("button",{className:"ghost",style:{padding:"4px 12px"},onClick:function(){resize(partners.length+1);}},"+")),
      partners.map(function(p,i){
        return div({key:p.id,display:"flex",gap:10,marginBottom:10,alignItems:"center"},
          e(Avatar,{name:p.name||String(i+1),idx:i,size:36}),
          e("input",{value:p.name,placeholder:"合伙人"+(i+1),onChange:function(ev){upP(p.id,"name",ev.target.value);},style:{flex:2,padding:"10px 14px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14}}),
          e("input",{type:"number",value:p.ratio,onChange:function(ev){upP(p.id,"ratio",ev.target.value);},style:{width:60,padding:"10px 8px",borderRadius:12,border:"none",background:"#F3F4F6",fontSize:14,textAlign:"center"}}),
          e("span",{style:{fontSize:13,color:"#6B7280"}},"%"));
      }),
      e("p",{style:{fontSize:12,color:total===100?"#10B981":"#F87171",marginTop:6,marginBottom:20,fontWeight:600}},"合计 "+total+"% "+(total===100?"✓":"（需等于100%）")),
      div({display:"flex",gap:10},
        !existing&&e("button",{className:"ghost",style:{flex:1},onClick:function(){setStep(0);}},"上一步"),
        e(GBtn,{style:{flex:2,padding:12},onClick:function(){if(ok)setStep(nextStep);},g:ok?G:"linear-gradient(135deg,#D1D5DB,#9CA3AF)"},"下一步"))
    );
  }
  return div({width:"100%",maxWidth:380,margin:"0 auto",padding:"20px 0"},
    e("p",{style:{fontSize:20,fontWeight:700,marginBottom:4}},"货币 & 汇率"),
    e("p",{style:{fontSize:13,color:"#6B7280",marginBottom:18}},"主要结算货币和默认汇率"),
    div({marginBottom:16},
      e(Lbl,{t:"主要结算货币"}),
      div({display:"flex",gap:10},
        e("button",{onClick:function(){setBase("CNY");},style:{flex:1,padding:"12px",borderRadius:14,background:base==="CNY"?G:"#F3F4F6",color:base==="CNY"?"#fff":"#6B7280",fontWeight:base==="CNY"?700:400,fontSize:14,boxShadow:base==="CNY"?"0 4px 12px rgba(192,132,252,0.3)":"none"}},"人民币 ¥"),
        e("button",{onClick:function(){setBase("AUD");},style:{flex:1,padding:"12px",borderRadius:14,background:base==="AUD"?G:"#F3F4F6",color:base==="AUD"?"#fff":"#6B7280",fontWeight:base==="AUD"?700:400,fontSize:14,boxShadow:base==="AUD"?"0 4px 12px rgba(192,132,252,0.3)":"none"}},"澳币 A$"))),
    div({marginBottom:20},
      e(Lbl,{t:"默认汇率（1 AUD = ? CNY）"}),
      live&&div({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F3E8FF",borderRadius:12,marginBottom:8},
        e("span",{style:{fontSize:13,color:"#7C3AED",fontWeight:500}},"实时 1 AUD = "+live+" CNY"),
        e("button",{className:"ghost",style:{padding:"4px 10px",fontSize:12},onClick:function(){setRate(live);}},"使用")),
      e("input",{type:"number",value:rate,placeholder:"4.70",onChange:function(ev){setRate(ev.target.value);},style:{background:"#F3F4F6",border:"none",borderRadius:12,padding:"10px 14px",fontSize:14,width:"100%"}})),
    div({display:"flex",gap:10},
      e("button",{className:"ghost",style:{flex:1},onClick:function(){setStep(existing?0:1);}},"上一步"),
      e(GBtn,{style:{flex:2,padding:12},onClick:done},existing?"保存":"开始使用"))
  );
}

// ── EntryForm ──────────────────────────────────────────────────────────────────
function EntryForm(p) {
  var type=p.type,month=p.month,setup=p.setup,onAdd=p.onAdd,onCancel=p.onCancel,editing=p.editing,onUpdate=p.onUpdate;
  var isI=type==="income",isC=type==="capital",ed=editing;
  var ds=useState(ed?ed.date:month+"-01");var date=ds[0];var setDate=ds[1];
  var as=useState(ed?String(ed.amount):"");var amt=as[0];var setAmt=as[1];
