<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
<script>
// Robust multi-CDN loader with fallback
(function(){
  function startLoader(){
  var CDNS = [
    {
      react:    "https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js",
      reactdom: "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js",
      recharts: "https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"
    },
    {
      react:    "https://unpkg.com/react@18.2.0/umd/react.production.min.js",
      reactdom: "https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js",
      recharts: "https://unpkg.com/recharts@2.12.7/umd/Recharts.js"
    },
    {
      react:    "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
      reactdom: "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
      recharts: null
    }
  ];

  var root = document.getElementById("root");

  function showError(msg) {
    root.innerHTML = "<div style=\"padding:40px;text-align:center;font-family:sans-serif\"><p style=\"font-size:18px;color:#B83232;margin-bottom:12px\">⚠️ 加载失败</p><p style=\"color:#666;font-size:14px;line-height:1.6\">" + msg + "</p><button onclick=\"location.reload()\" style=\"margin-top:20px;padding:10px 24px;background:#0D0D0D;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer\">重新加载</button></div>";
  }

  function loadScript(url, cb) {
    if (!url) { cb(true); return; }
    var s = document.createElement("script");
    s.src = url;
    s.onload = function() { cb(false); };
    s.onerror = function() { cb(true); };
    document.head.appendChild(s);
  }

  function tryLoadCdn(cdnIdx) {
    if (cdnIdx >= CDNS.length) {
      showError("所有CDN均无法加载，请检查网络连接后刷新页面。<br>如在中国大陆访问，可能需要使用代理。");
      return;
    }
    var cdn = CDNS[cdnIdx];
    root.innerHTML = "<p style=\"padding:40px;text-align:center;color:#999;font-size:13px\">加载中 (" + (cdnIdx+1) + "/" + CDNS.length + ")...</p>";
    
    loadScript(cdn.react, function(err1) {
      if (err1) { tryLoadCdn(cdnIdx + 1); return; }
      loadScript(cdn.reactdom, function(err2) {
        if (err2) { tryLoadCdn(cdnIdx + 1); return; }
        loadScript(cdn.recharts, function(err3) {
          // recharts failure is non-fatal (charts just won't show)
          if (!window.React || !window.ReactDOM) { tryLoadCdn(cdnIdx + 1); return; }
          // All core deps loaded — trigger app init
          var evt = new Event("deps-ready");
          document.dispatchEvent(evt);
        });
      });
    });
  }

  tryLoadCdn(0);
  } // end startLoader
  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded", startLoader);
  } else {
    startLoader();
  }
})();
</script>
<style>
:root {
  --ink: #0D0D0D;
  --ink2: #3D3D3D;
  --ink3: #7A7A7A;
  --ink4: #B0B0B0;
  --paper: #F5F0E8;
  --paper2: #EDE8DC;
  --paper3: #E3DCCF;
  --white: #FDFAF5;
  --gold: #C8922A;
  --gold-light: #F5E6C8;
  --green: #2A7A4B;
  --green-light: #D4EBE0;

  --red-light: #F5DDDD;

html,body{background:var(--paper);font-family:'DM Sans',sans-serif;color:var(--ink);}

/* Noise texture overlay */
#root::before{content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);width:480px;height:100vh;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.6;}

.mono{font-family:'Space Mono',monospace;}

.sec-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;font-family:'Space Mono',monospace;}

<body>
<div id="root"><p style="padding:40px;text-align:center;color:var(--ink3);font-family:'Space Mono',monospace;letter-spacing:.1em">加载中...</p></div>
<script>
(function() {
  "use strict";

  function init() {
    if (!window.React || !window.ReactDOM) {
      document.getElementById("root").innerHTML = "<p style='padding:40px;color:red'>React加载失败，请刷新</p>";
      return;
    }

    var h = React.createElement;
    var useState = React.useState;
    var useReducer = React.useReducer;
    var useMemo = React.useMemo;
    var useEffect = React.useEffect;
    var RC = window.Recharts || {};
    var hasCharts = !!(RC.ResponsiveContainer && RC.BarChart && RC.PieChart);

    var PAL = ["#C8922A","#2A7A4B","#2A4E8C","#8C2A5E","#5E6E2A","#7A3B1E","#2A6B7A","#6B2A7A"];
    var SK = "bizbook_v6";

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
    function tod() { return new Date().toISOString().slice(0,10); }
    function tmn() { return new Date().toISOString().slice(0,7); }
    function genM() {
      var r=[], now=new Date();
      for(var i=-6;i<=6;i++){var d=new Date(now.getFullYear(),now.getMonth()+i,1);r.push(d.toISOString().slice(0,7));}
      return r;
    }
    var MONTHS = genM();
    function fn(n,d){d=d||2;return isNaN(+n)?"0.00":(+n).toFixed(d);}
    function fc(n,c){return c==="AUD"?"A$"+fn(n):"¥"+fn(n);}
    function tb(a,c,bc,r){
      var v=+a||0;
      if(c===bc)return v;
      if(bc==="CNY"&&c==="AUD")return v*(+r||1);
      if(bc==="AUD"&&c==="CNY")return v/(+r||1);
      return v;
    }
    function rb(e,r,m,bc){
      if(m==="historical")return e.amountBase||0;
      return tb(e.amount,e.currency,bc,r);
    }

    var GAS_URL = (function(){try{return localStorage.getItem("bizbook_gas_url")||"";}catch(x){return "";}}());

    function lsSave(s) {
      try { localStorage.setItem(SK, JSON.stringify(s)); } catch(x) {}
      if (!GAS_URL) return;
      clearTimeout(lsSave._t);
      lsSave._t = setTimeout(function() {
        // Use GET with encoded value to avoid CORS preflight (OPTIONS) block
        var encoded = encodeURIComponent(JSON.stringify(s));
        fetch(GAS_URL + "?action=save&key=" + encodeURIComponent(SK) + "&value=" + encoded)
          .catch(function() {});
      }, 1500);
    }

    function lsLoad() {
      try { var s = localStorage.getItem(SK); return s ? JSON.parse(s) : null; } catch(x) { return null; }
    }

    function cloudLoad(cb) {
      if (!GAS_URL) { cb(null); return; }
      fetch(GAS_URL + "?action=load&key=" + encodeURIComponent(SK))
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res.ok && res.data && res.data.value) {
            try { cb(JSON.parse(res.data.value)); } catch(x) { cb(null); }
          } else { cb(null); }
        })
        .catch(function() { cb(null); });
    }

    function calcBal(entries,partners,rate,mode,bc) {
      var op=entries.filter(function(x){return x.type!=="capital"&&x.type!=="settlement";});
      var inc=0,exp=0;
      op.forEach(function(x){if(x.type==="income")inc+=rb(x,rate,mode,bc);else exp+=rb(x,rate,mode,bc);});
      var profit=inc-exp;
      var held={};
      partners.forEach(function(p){held[p.id]=0;});
      op.forEach(function(x){
        if(!x.paidBy||held[x.paidBy]===undefined)return;
        var b=rb(x,rate,mode,bc);
        if(x.type==="income")held[x.paidBy]+=b;
        else held[x.paidBy]-=b;
      });
      entries.filter(function(x){return x.type==="capital"&&(x.capitalFlow||"pool")==="pool";}).forEach(function(x){
        if(held[x.paidBy]!==undefined)held[x.paidBy]-=rb(x,rate,mode,bc);
      });
      entries.filter(function(x){return x.type==="settlement";}).forEach(function(x){
        if(!x.fromId||!x.toId)return;
        var b=rb(x,rate,mode,bc);
        if(held[x.fromId]!==undefined)held[x.fromId]+=b;
        if(held[x.toId]!==undefined)held[x.toId]-=b;
      });
      var bal={};
      partners.forEach(function(p){bal[p.id]=(profit*(p.ratio/100))-held[p.id];});
      return bal;
    }

    function getLoans(entries,partners,rate,mode,bc) {
      var loans={};
      entries.filter(function(x){return x.type==="capital"&&x.capitalFlow==="partner"&&x.paidBy&&x.capitalTo&&x.capitalTo!==x.paidBy;}).forEach(function(x){
        var k=x.capitalTo+"_"+x.paidBy;
        loans[k]=(loans[k]||0)+rb(x,rate,mode,bc);
      });
      var res=[];
      Object.keys(loans).forEach(function(k){
        var amt=loans[k];
        if(amt<=0.005)return;
        var p=k.split("_"), bid=p[0], lid=p[1];
        var bn=partners.find(function(x){return x.id===bid;});
        var ln=partners.find(function(x){return x.id===lid;});
        res.push({from:bid,fromName:bn?bn.name:"?",to:lid,toName:ln?ln.name:"?",amount:amt,isLoan:true});
      });
      return res;
    }

    function minTr(bal,partners) {
      var arr=partners.map(function(p){return{id:p.id,name:p.name,b:bal[p.id]||0};}).sort(function(a,b){return a.b-b.b;});
      var tr=[],lo=0,hi=arr.length-1;
      while(lo<hi){
        if(Math.abs(arr[lo].b)<0.005){lo++;continue;}
        if(Math.abs(arr[hi].b)<0.005){hi--;continue;}
        var a=Math.min(-arr[lo].b,arr[hi].b);
        if(a>0.005)tr.push({from:arr[lo].id,fromName:arr[lo].name,to:arr[hi].id,toName:arr[hi].name,amount:a});
        arr[lo].b+=a;arr[hi].b-=a;
        if(Math.abs(arr[lo].b)<0.005)lo++;
        if(Math.abs(arr[hi].b)<0.005)hi--;
      }
      return tr;
    }

    function mergeTr(ptrs,ltrs,partners) {
      var net={};
      partners.forEach(function(p){net[p.id]=0;});
      ptrs.concat(ltrs).forEach(function(t){net[t.from]-=t.amount;net[t.to]+=t.amount;});
      return minTr(net,partners);
    }

    function initSt(saved) {
      var def={setup:null,month:tmn(),tab:"dash",rateMode:"historical",entries:[],settlements:[],cd:null,sf:null,ee:null,ss:false,sm:false};
      if(!saved)return def;
      return Object.assign({},def,saved,{cd:null,sf:null,ee:null,ss:false,sm:false});
    }

    function red(s,a) {
      var n;
      switch(a.t){
        case"DONE": n=Object.assign({},s,{setup:a.v,tab:"dash",sf:null,ee:null});break;
        case"TAB":  n=Object.assign({},s,{tab:a.v,sf:null,ee:null,ss:false,sm:false});break;
        case"MON":  n=Object.assign({},s,{month:a.v});break;
        case"RM":   n=Object.assign({},s,{rateMode:a.v});break;
        case"UPS":  n=Object.assign({},s,{setup:a.v});break;
        case"SF":   n=Object.assign({},s,{sf:a.v,ee:null,ss:false,sm:false});break;
        case"EE":   n=Object.assign({},s,{ee:a.v,sf:a.v.type,ss:false,sm:false});break;
        case"AI":   n=Object.assign({},s,{entries:s.entries.concat([Object.assign({},a.v,{id:uid()})]),sf:null,ee:null});break;
        case"UI":   n=Object.assign({},s,{entries:s.entries.map(function(x){return x.id===a.v.id?a.v:x;}),sf:null,ee:null});break;
        case"DI":   n=Object.assign({},s,{entries:s.entries.filter(function(x){return x.id!==a.v;}),cd:null});break;
        case"AS":   n=Object.assign({},s,{settlements:s.settlements.concat([Object.assign({},a.v,{id:uid()})]),entries:s.entries.concat(a.se),ss:false,sm:false});break;
        case"DS":{var lk=(s.settlements.find(function(x){return x.id===a.v;})||{}).linkedEntryIds||[];n=Object.assign({},s,{settlements:s.settlements.filter(function(x){return x.id!==a.v;}),entries:s.entries.filter(function(x){return lk.indexOf(x.id)===-1;}),cd:null});break;}
        case"CD":   n=Object.assign({},s,{cd:a.v});break;
        case"CC":   n=Object.assign({},s,{cd:null});break;
        case"_HYDRATE": n=initSt(a.v); lsSave(n); return n;
        case"RESET":localStorage.removeItem(SK);return initSt(null);
        case"SS":   n=Object.assign({},s,{ss:a.v,sf:null,ee:null,sm:false});break;
        case"SM":   n=Object.assign({},s,{sm:a.v,sf:null,ee:null,ss:false});break;
        default:return s;
      }
      lsSave(n);return n;
    }

    // helpers
    function dv(props){
      var c=[];
      for(var i=1;i<arguments.length;i++){if(arguments[i]!==null&&arguments[i]!==undefined&&arguments[i]!==false)c.push(arguments[i]);}
      var className=props.className,key=props.key;
      var style=Object.assign({},props);
      delete style.className;delete style.key;
      var attrs={style:style};
      if(className)attrs.className=className;
      if(key!==undefined)attrs.key=key;
      return h("div",attrs,c);
    }
    function Lbl(p){return h("p",{className:"lbl"},p.t);}
    function Inp(p){return h("input",{type:p.type||"text",value:p.val,placeholder:p.ph||"",onChange:function(e){p.set(e.target.value);},style:p.sx||{}});}
    function Sel(p){return h("select",{value:p.val,onChange:function(e){p.set(e.target.value);}},p.opts.map(function(o){return h("option",{key:o[0],value:o[0]},o[1]);}));}

    function RatePill(p){
      return h("div",{className:"pill-bar",style:{minWidth:140}},
        h("button",{className:p.val==="historical"?"on":"",onClick:function(){p.set("historical");}},"历史"),
        h("button",{className:p.val==="current"?"on":"",onClick:function(){p.set("current");}},"实时"));
    }
    function CurrPill(p){
      return h("div",{className:"pill-bar"},
        h("button",{className:p.val==="CNY"?"on":"",onClick:function(){p.set("CNY");}},"¥ CNY"),
        h("button",{className:p.val==="AUD"?"on":"",onClick:function(){p.set("AUD");}},"A$ AUD"));
    }

    function Avatar(p){
      var sz=p.sz||36,c=PAL[(p.i||0)%PAL.length];
      return dv({width:sz,height:sz,borderRadius:2,background:c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.38,fontWeight:700,color:"#fff",flexShrink:0,fontFamily:"'Noto Serif SC',serif"},
        (p.n||"?").slice(0,1));
    }

    function PriBtn(p){
      return h("button",{onClick:p.onClick,className:"pri-btn",style:Object.assign({width:p.full?"100%":"auto"},p.sx||{})},p.children);
    }

    function CDlg(p){
      return dv({position:"fixed",inset:0,background:"rgba(13,13,13,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:999,padding:"0 16px 32px"},
        dv({background:p.danger?"#FFF8F8":p.confirm?"#F8FFF9":"var(--white)",border:"1px solid var(--paper3)",borderRadius:"var(--radius-lg)",padding:24,width:"100%",maxWidth:420,boxShadow:"0 -4px 32px rgba(0,0,0,0.12)"},
          h("p",{style:{fontSize:15,marginBottom:6,fontWeight:600,textAlign:"center",fontFamily:"'Noto Serif SC',serif"}},p.title||"确认"),
          h("p",{style:{fontSize:13,marginBottom:20,textAlign:"center",color:"var(--ink3)"}},p.msg||""),
          dv({display:"flex",gap:10},
            h("button",{className:"ghost-btn",style:{flex:1},onClick:p.onCancel},"取消"),
            h("button",{onClick:p.onOk,style:{flex:2,background:p.danger?"var(--red)":"var(--ink)",color:"var(--white)",borderRadius:"var(--radius)",padding:"11px",fontWeight:600,fontSize:14,border:"none",cursor:"pointer"}},p.okText||"确认"))));
    }

    function var_(name){return "var("+name+")";}

    // ── Setup ─────────────────────────────────────────────────────────────────
    function Setup(p) {
      var s0=useState(0),step=s0[0],setStep=s0[1];
      var ip=p.ex&&p.ex.partners?p.ex.partners:[{id:uid(),name:"",ratio:50},{id:uid(),name:"",ratio:50}];
      var s1=useState(ip),parts=s1[0],setParts=s1[1];
      var s2=useState(p.ex?p.ex.baseCurrency||"CNY":"CNY"),bc=s2[0],setBc=s2[1];
      var s3=useState(String(p.ex?p.ex.rate||4.7:4.7)),rt=s3[0],setRt=s3[1];
      var s4=useState(null),live=s4[0],setLive=s4[1];
      useEffect(function(){
        fetch("https://api.frankfurter.app/latest?from=AUD&to=CNY")
          .then(function(r){return r.json();})
          .then(function(d){if(d&&d.rates&&d.rates.CNY)setLive((+d.rates.CNY).toFixed(4));})
          .catch(function(){});
      },[]);
      var tot=parts.reduce(function(s,x){return s+(+x.ratio||0);},0);
      function up(id,f,v){setParts(function(ps){return ps.map(function(x){return x.id===id?Object.assign({},x,(f==="name"?{name:v}:{ratio:v})):x;});});}
      function rsz(n){
        var cnt=Math.min(8,Math.max(2,n));
        var b=Math.floor(100/cnt),rem=100-b*(cnt-1);
        setParts(Array.from({length:cnt},function(_,i){return{id:(parts[i]&&parts[i].id)||uid(),name:(parts[i]&&parts[i].name)||"",ratio:i===cnt-1?rem:b};}));

                  h(PriBtn,{onClick:function(){var n=+rateInput;if(n>0){dp({t:"UPS",v:Object.assign({},setup,{rate:n})});setRateInput("");}},sx:{padding:"10px 16px",fontSize:13}},"更新"))),
            dv({className:"card",marginBottom:16},
              h("p",{style:{fontWeight:700,marginBottom:12,fontFamily:"'Noto Serif SC',serif"}},"合伙人 & 货币"),
              h("p",{style:{fontSize:12,color:"var(--ink3)",marginBottom:12}},"合伙人共 "+setup.partners.length+" 人"),
              setup.partners.map(function(p,i){
                return dv({key:p.id,display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<setup.partners.length-1?"1px solid var(--paper2)":"none"},
                  h(Avatar,{n:p.name,i:i,sz:28}),
                  h("span",{style:{fontSize:13,flex:1}},""+p.name),
                  h("span",{style:{fontSize:12,fontFamily:"'Space Mono',monospace",color:"var(--ink3)"}},p.ratio+"%"));
              }),
              h("p",{style:{fontSize:11,color:"var(--ink4)",marginTop:10}},"如需修改合伙人或比例，请清空数据后重新设置。")),
            dv({className:"card",marginBottom:16},
              h("p",{style:{fontWeight:700,marginBottom:4,fontFamily:"'Noto Serif SC',serif"}},"☁ Google Sheets 云同步"),
              h("p",{style:{fontSize:11,color:"var(--ink3)",marginBottom:10,lineHeight:1.6}},GAS_URL?"已连接云端，数据自动同步":"填入 Apps Script 部署 URL 后启用云同步"),
              h("input",{
                type:"text",
                placeholder:"https://script.google.com/macros/s/xxx/exec",
                defaultValue:GAS_URL,
                id:"gas-url-input",
                style:{fontSize:11,fontFamily:"'Space Mono',monospace",marginBottom:8}
              }),
              dv({display:"flex",gap:8},
                h(PriBtn,{onClick:function(){
                  var v=(document.getElementById("gas-url-input")||{}).value||"";
                  GAS_URL=v.trim();
                  try{localStorage.setItem("bizbook_gas_url",GAS_URL);}catch(x){}
                  if(GAS_URL){setCloudStatus("loading");cloudLoad(function(remote){
                    if(remote){var localEntries=(lsLoad()||{}).entries||[];var remoteEntries=remote.entries||[];
                      if(remoteEntries.length>=localEntries.length)dp({t:"_HYDRATE",v:remote});}
                    setCloudStatus("synced");
                  });}else{setCloudStatus("idle");}
                },sx:{flex:2,padding:"9px 14px",fontSize:12}},GAS_URL?"重新连接":"连接"),
                GAS_URL&&h("button",{className:"ghost-btn",style:{flex:1,fontSize:12},onClick:function(){
                  GAS_URL="";try{localStorage.removeItem("bizbook_gas_url");}catch(x){}
                  setCloudStatus("idle");
                }},"断开"))),
            dv({className:"card",border:"1px solid #F5DDDD"},
              h("p",{style:{fontWeight:700,marginBottom:4,color:"var(--red)",fontFamily:"'Noto Serif SC',serif"}},"危险区域"),
              h("p",{style:{fontSize:11,color:"var(--ink3)",marginBottom:12}},"清空所有数据，不可撤销"),
              h("button",{onClick:function(){dp({t:"CD",v:{k:"reset",title:"清空所有数据",msg:"此操作不可撤销，所有记录将永久删除",danger:true,ok:"清空"}});},style:{width:"100%",padding:"11px",borderRadius:"var(--radius)",background:"#FFF8F8",color:"var(--red)",fontWeight:700,fontSize:13,border:"1px solid #F5DDDD",cursor:"pointer"}},"清空所有数据"))
          )
        ),

        // Bottom Nav
        dv({position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(253,250,245,0.97)",borderTop:"1px solid var(--paper2)",display:"flex",padding:"8px 0 20px",backdropFilter:"blur(10px)"},
          TABS.map(function(t){
            return h("button",{key:t[0],onClick:function(){dp({t:"TAB",v:t[0]});},style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",padding:"4px 0"}},
              h("span",{style:{fontSize:16,opacity:tab===t[0]?1:0.25,transition:"opacity .15s"}},(t[1])),
              h("span",{style:{fontSize:9,fontWeight:tab===t[0]?700:400,color:tab===t[0]?"var(--ink)":"var(--ink4)",fontFamily:"'Space Mono',monospace",letterSpacing:".04em"}},t[2]),
              tab===t[0]&&dv({width:14,height:2,borderRadius:1,background:"var(--ink)",marginTop:1}));
          }))
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  }

  // Listen for deps-ready event dispatched by the CDN loader
  document.addEventListener("deps-ready", function() {
    try { init(); }
    catch(err) {
      document.getElementById("root").innerHTML =
        "<div style=\'padding:40px;text-align:center;font-family:sans-serif\'>" +
        "<p style=\'color:#B83232;font-size:16px;margin-bottom:8px\'>启动错误</p>" +
        "<p style=\'color:#666;font-size:12px;font-family:monospace\'>" + err.message + "</p>" +
        "<button onclick=\'location.reload()\' style=\'margin-top:16px;padding:8px 20px;background:#0D0D0D;color:#fff;border:none;border-radius:4px;cursor:pointer\'>刷新</button>" +
        "</div>";
    }
  });
})();
</script>
